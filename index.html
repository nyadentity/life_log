<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#efefef" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="家計簿" />
<title>家計簿</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-180.png" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN','Hiragino Sans','Meiryo',sans-serif;
    background: #efefef; color: rgba(0,0,0,0.62);
    -webkit-font-smoothing: antialiased; -webkit-text-size-adjust: 100%;
  }
  button { -webkit-tap-highlight-color: transparent; font-family: inherit; }
  input, textarea, select { font-family: inherit; }
  textarea { resize: none; }
  #root { max-width: 412px; margin: 0 auto; padding: max(env(safe-area-inset-top),24px) 16px calc(56px + env(safe-area-inset-bottom)); }
  .col { width: 100%; max-width: 380px; margin: 0 auto; }

  .header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 14px; }
  .title { font-size: 17px; font-weight: 700; letter-spacing: .05em; color: rgba(0,0,0,0.65); margin-bottom: 2px; }
  .subdate { font-size: 11px; color: rgba(0,0,0,0.33); }
  .sectabs { display: flex; gap: 4px; padding-top: 3px; flex-shrink: 0; }
  .sectab { padding: 5px 10px; background: rgba(0,0,0,0.04); border: none; border-radius: 8px; font-size: 11px; font-weight: 400; color: rgba(0,0,0,0.4); cursor: pointer; white-space: nowrap; }
  .sectab.active { background: rgba(0,0,0,0.09); font-weight: 600; color: rgba(0,0,0,0.65); }

  .scrolltab { display: flex; gap: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; margin-bottom: 14px; }
  .scrolltab::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; min-width: 56px; padding: 7px 12px; border-radius: 9px; background: transparent; border: 1px solid transparent; font-size: 12px; font-weight: 400; color: rgba(0,0,0,0.35); cursor: pointer; white-space: nowrap; }
  .tab.active { background: rgba(255,255,255,0.92); border: 1px solid rgba(0,0,0,0.07); font-weight: 600; color: rgba(0,0,0,0.65); }

  .monthnav { display: flex; align-items: center; gap: 4px; margin-bottom: 12px; }
  .monthnav .nb { background: rgba(255,255,255,0.92); border: 1px solid rgba(0,0,0,0.07); border-radius: 9px; width: 30px; height: 30px; font-size: 15px; color: rgba(0,0,0,0.35); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .monthnav .nb[disabled] { opacity: .3; cursor: default; }
  .monthnav .mlabel { flex: 1; text-align: center; background: rgba(255,255,255,0.92); border: 1px solid rgba(0,0,0,0.07); border-radius: 9px; padding: 6px 0; }
  .monthnav .mlabel span { font-size: 12px; font-weight: 600; color: rgba(0,0,0,0.6); }
  .monthnav .mlabel small { font-size: 11px; font-weight: 400; color: rgba(0,0,0,0.3); margin-left: 6px; }

  .card { width: 100%; background: rgba(255,255,255,0.92); border: 1px solid rgba(0,0,0,0.07); border-radius: 14px; margin-bottom: 10px; overflow: hidden; }
  .cardpad { display: flex; gap: 12px; padding: 12px 16px; }
  .bar { width: 4px; border-radius: 2px; flex-shrink: 0; align-self: stretch; }
  .body { flex: 1; min-width: 0; }

  .seclbl { font-size: 11px; font-weight: 700; letter-spacing: .07em; color: rgba(0,0,0,0.33); margin: 4px 2px 6px; }
  .total { font-size: 26px; font-weight: 700; color: rgba(0,0,0,0.65); letter-spacing: .01em; }
  .total small { font-size: 12px; font-weight: 400; color: rgba(0,0,0,0.35); margin-left: 6px; }
  .count { font-size: 11px; color: rgba(0,0,0,0.33); margin-top: 3px; }
  .budgetbar { height: 6px; background: rgba(0,0,0,0.06); border-radius: 99px; margin-top: 10px; overflow: hidden; }
  .budgetbar > div { height: 100%; border-radius: 99px; background: #b8dda0; }


  .accrow { display: flex; align-items: baseline; gap: 8px; padding: 5px 0; }
  .accname { font-size: 13px; color: rgba(0,0,0,0.6); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .accbal { font-size: 14px; font-weight: 700; color: rgba(0,0,0,0.62); flex-shrink: 0; margin-left: auto; }
  .wtag { font-size: 9px; font-weight: 600; color: rgba(0,0,0,0.35); background: rgba(184,221,160,0.4); border-radius: 6px; padding: 1px 6px; flex-shrink: 0; }
  .subnote { font-size: 10px; color: rgba(0,0,0,0.3); margin-top: 2px; }

  .searchcard .cardpad { padding: 4px 14px; align-items: center; }
  .searchinp { flex: 1; min-width: 0; border: none; background: transparent; font-size: 13px; color: rgba(0,0,0,0.62); outline: none; padding: 4px 0; -webkit-appearance: none; appearance: none; }
  .searchinp::placeholder { color: rgba(0,0,0,0.28); }
  .clr { background: transparent; border: none; padding: 0; width: 24px; height: 24px; font-size: 15px; color: rgba(0,0,0,0.3); cursor: pointer; flex-shrink: 0; display: none; align-items: center; justify-content: center; line-height: 1; }

  .toprow { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
  .rtag { font-size: 11px; font-weight: 600; color: rgba(0,0,0,0.5); border-radius: 8px; padding: 2px 9px; flex-shrink: 0; }
  .rtag2 { font-size: 10px; font-weight: 600; color: rgba(0,0,0,0.4); background: rgba(0,0,0,0.05); border-radius: 6px; padding: 1px 7px; flex-shrink: 0; }
  .rdate { font-size: 12px; font-weight: 600; color: rgba(0,0,0,0.45); white-space: nowrap; }
  .ramt { font-size: 15px; font-weight: 700; color: rgba(0,0,0,0.62); white-space: nowrap; }
  .editbtn { background: rgba(0,0,0,0.06); border: none; border-radius: 8px; padding: 3px 9px; font-size: 11px; font-weight: 600; color: rgba(0,0,0,0.45); cursor: pointer; flex-shrink: 0; }
  .movebtn { background: rgba(0,0,0,0.05); border: none; border-radius: 5px; width: 22px; height: 15px; font-size: 8px; color: rgba(0,0,0,0.4); cursor: pointer; line-height: 1; padding: 0; display: flex; align-items: center; justify-content: center; }
  .movebtn[disabled] { opacity: .25; cursor: default; }
  .rparty { font-size: 13px; color: rgba(0,0,0,0.6); margin-top: 4px; word-break: break-word; }
  .rmemo { font-size: 12px; color: rgba(0,0,0,0.45); line-height: 1.5; margin-top: 3px; word-break: break-word; white-space: pre-wrap; }
  .grow { flex: 1; }
  .empty { text-align: center; color: rgba(0,0,0,0.28); font-size: 12px; padding: 28px 0; }

  .addbtn { width: 100%; background: rgba(255,255,255,0.92); border: 1px solid rgba(0,0,0,0.07); border-radius: 14px; padding: 11px 0; font-size: 12px; font-weight: 600; color: rgba(0,0,0,0.4); cursor: pointer; margin-bottom: 10px; }

  .formpad { padding: 14px 16px; }
  .typesel { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; margin-bottom: 14px; }
  .typesel::-webkit-scrollbar { display: none; }
  .typepill { flex-shrink: 0; border: none; border-radius: 9px; padding: 6px 12px; font-size: 12px; font-weight: 600; color: rgba(0,0,0,0.35); background: rgba(0,0,0,0.04); cursor: pointer; white-space: nowrap; }
  .typepill.active { color: rgba(0,0,0,0.65); }
  .frow { display: flex; gap: 12px; margin-bottom: 12px; }
  .ffield { flex: 1; min-width: 0; }
  .ffield.amt { flex: 0 0 46%; }
  .flabel { font-size: 10px; color: rgba(0,0,0,0.38); font-weight: 600; margin-bottom: 4px; }
  .finp { border: none; border-bottom: 1px solid rgba(0,0,0,0.1); background: transparent; font-size: 14px; color: rgba(0,0,0,0.65); outline: none; padding: 6px 0; width: 100%; display: block; }
  .finp::placeholder { color: rgba(0,0,0,0.28); }
  .finp.amt { text-align: right; font-weight: 700; }
  .fsel { border: none; border-bottom: 1px solid rgba(0,0,0,0.1); background: transparent; font-size: 14px; color: rgba(0,0,0,0.65); outline: none; padding: 6px 0; width: 100%; display: block; -webkit-appearance: none; appearance: none; border-radius: 0; }
  .ftext { border: none; background: transparent; font-size: 13px; color: rgba(0,0,0,0.6); outline: none; line-height: 1.6; width: 100%; display: block; border-bottom: 1px solid rgba(0,0,0,0.1); padding: 4px 0 6px; margin-bottom: 12px; }
  .ftext::placeholder { color: rgba(0,0,0,0.28); }
  .fchecks { display: flex; gap: 14px; margin-bottom: 12px; }
  .fcheck { display: flex; align-items: center; gap: 5px; font-size: 12px; color: rgba(0,0,0,0.5); }
  .fcheck input { width: 15px; height: 15px; }
  .fnote { font-size: 10px; color: rgba(0,0,0,0.32); margin: -6px 0 12px; line-height: 1.5; }
  .fbtns { display: flex; gap: 8px; }
  .fbtn { border: none; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .fbtn.del { background: rgba(0,0,0,0.05); color: rgba(0,0,0,0.35); padding: 8px 12px; }
  .fbtn.cancel { background: rgba(0,0,0,0.06); color: rgba(0,0,0,0.45); flex: 1; padding: 8px 0; }
  .fbtn.save { flex: 2; padding: 8px 0; font-weight: 700; color: rgba(0,0,0,0.6); background: #b8dda0; }
  .fbtn[disabled] { opacity: .35; cursor: default; }

  .statbars { display: flex; align-items: flex-end; gap: 2px; height: 50px; }
  .statcol { flex: 1; display: flex; align-items: flex-end; justify-content: center; cursor: pointer; }
  .statbar { width: 62%; border-radius: 99px 99px 0 0; min-height: 1px; }
  .statlabels { display: flex; margin-top: 2px; border-top: 1px solid rgba(0,0,0,0.06); padding-top: 3px; }
  .statlabel { flex: 1; text-align: center; font-size: 8px; color: rgba(0,0,0,0.25); }
  .statread { font-size: 11px; color: rgba(0,0,0,0.4); min-height: 15px; margin-top: 8px; }
  .bdrow { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; gap: 10px; }
  .bdname { font-size: 12px; color: rgba(0,0,0,0.45); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bdamt { font-size: 12px; font-weight: 600; color: rgba(0,0,0,0.55); flex-shrink: 0; }
  .breakline { margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.06); }

  .btnrow { display: flex; gap: 8px; padding: 12px 16px; }
  .sbtn { flex: 1; background: rgba(0,0,0,0.06); border: none; border-radius: 8px; padding: 9px 0; font-size: 12px; font-weight: 600; color: rgba(0,0,0,0.45); cursor: pointer; text-align: center; display: block; }
  .note { font-size: 10px; color: rgba(0,0,0,0.28); padding: 0 16px 12px; line-height: 1.5; }
  .confirmtext { font-size: 12px; color: rgba(0,0,0,0.55); margin-bottom: 12px; line-height: 1.5; }
  .danger { background: rgba(220,80,80,0.12); color: rgba(180,50,50,0.85); font-weight: 700; }
  .daysel { border: none; background: rgba(0,0,0,0.06); border-radius: 8px; padding: 7px 4px; font-size: 15px; font-weight: 700; color: rgba(0,0,0,0.6); outline: none; -webkit-appearance: none; appearance: none; min-width: 56px; text-align: center; text-align-last: center; }
  .statsel { border: none; background: transparent; font-size: 12px; font-weight: 600; color: rgba(0,0,0,0.6); outline: none; -webkit-appearance: none; appearance: none; text-align: center; text-align-last: center; padding: 0 2px; }
  .okmsg { font-size: 11px; color: rgba(80,140,90,0.9); margin: -2px 0 10px; padding-left: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script>
(function () {
  "use strict";

  var APP_VERSION = "1.1"; // 設定画面の最後に表示。更新のたびにClaudeが自動で上げる

  /* ---------- IndexedDB ---------- */
  var DB_NAME = "kakeibo-db", ACC = "accounts", TX = "txs", META = "meta";
  function openDB() {
    return new Promise(function (resolve, reject) {
      var req = indexedDB.open(DB_NAME, 3);
      req.onupgradeneeded = function (e) {
        var db = e.target.result;
        if (db.objectStoreNames.contains("entries")) db.deleteObjectStore("entries"); // 旧データ破棄
        if (!db.objectStoreNames.contains(ACC)) db.createObjectStore(ACC, { keyPath: "id" });
        if (!db.objectStoreNames.contains(TX)) db.createObjectStore(TX, { keyPath: "id" });
        if (!db.objectStoreNames.contains(META)) db.createObjectStore(META, { keyPath: "key" });
      };
      req.onsuccess = function () { resolve(req.result); };
      req.onerror = function () { reject(req.error); };
    });
  }
  function dbAll(store) { return openDB().then(function (db) { return new Promise(function (res, rej) {
    var r = db.transaction(store, "readonly").objectStore(store).getAll();
    r.onsuccess = function () { res(r.result || []); }; r.onerror = function () { rej(r.error); };
  }); }); }
  function dbPut(store, v) { return openDB().then(function (db) { return new Promise(function (res, rej) {
    var r = db.transaction(store, "readwrite").objectStore(store).put(v);
    r.onsuccess = function () { res(); }; r.onerror = function () { rej(r.error); };
  }); }); }
  function dbDel(store, id) { return openDB().then(function (db) { return new Promise(function (res, rej) {
    var r = db.transaction(store, "readwrite").objectStore(store).delete(id);
    r.onsuccess = function () { res(); }; r.onerror = function () { rej(r.error); };
  }); }); }
  function dbClear(store) { return openDB().then(function (db) { return new Promise(function (res, rej) {
    var r = db.transaction(store, "readwrite").objectStore(store).clear();
    r.onsuccess = function () { res(); }; r.onerror = function () { rej(r.error); };
  }); }); }
  function dbGetMeta(key) { return openDB().then(function (db) { return new Promise(function (res, rej) {
    var r = db.transaction(META, "readonly").objectStore(META).get(key);
    r.onsuccess = function () { res(r.result ? r.result.value : undefined); }; r.onerror = function () { rej(r.error); };
  }); }); }
  function dbSetMeta(key, value) { return dbPut(META, { key: key, value: value }); }

  /* ---------- 定数 ---------- */
  var TXTYPES = [
    { key: "income",   label: "収入",     color: "#c2d8f0", dim: "rgba(194,216,240,0.45)" },
    { key: "transfer", label: "振替",     color: "#b8dda0", dim: "rgba(184,221,160,0.45)" },
    { key: "expense",  label: "支出",     color: "#f2c0d8", dim: "rgba(242,192,216,0.45)" },
    { key: "cardpay",  label: "引き落とし", color: "#fbd5ac", dim: "rgba(251,213,172,0.45)" },
    { key: "adjust",   label: "残高調整",  color: "#d9d9d9", dim: "rgba(0,0,0,0.06)" }
  ];
  function txTypeOf(k) { for (var i = 0; i < TXTYPES.length; i++) if (TXTYPES[i].key === k) return TXTYPES[i]; }
  var ACCTYPES = [
    { key: "bank",   label: "銀行" },
    { key: "cash",   label: "現金" },
    { key: "emoney", label: "電子マネー" },
    { key: "card",   label: "カード" },
    { key: "loan",   label: "貸し借り" }
  ];
  function accTypeOf(k) { for (var i = 0; i < ACCTYPES.length; i++) if (ACCTYPES[i].key === k) return ACCTYPES[i]; }
  var CAT_DEFAULTS = ["食費","日用品","家賃","光熱費","通信","医療","交通","交際","娯楽","子ども","その他"];
  var WD = ["日","月","火","水","木","金","土"];

  /* ---------- helpers ---------- */
  function pad2(n) { return String(n).padStart(2, "0"); }
  function todayStr() { var d = new Date(); return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()); }
  function isoOf(d) { return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()); }
  function dateFromISO(iso) { var p = iso.split("-"); return new Date(+p[0], +p[1] - 1, +p[2]); }
  function yen(n) { var v = Math.round(Number(n || 0)); return (v < 0 ? "-¥" : "¥") + Math.abs(v).toLocaleString("ja-JP"); }
  function yenSigned(n) { var v = Math.round(Number(n || 0)); return (v < 0 ? "-¥" : "+¥") + Math.abs(v).toLocaleString("ja-JP"); }
  function fmtDate(iso) { if (!iso) return ""; var p = iso.split("-"); var dt = new Date(+p[0], +p[1]-1, +p[2]); return (+p[1]) + "月" + (+p[2]) + "日(" + WD[dt.getDay()] + ")"; }
  function fmtDateFull(iso) { if (!iso) return ""; var p = iso.split("-"); var dt = new Date(+p[0], +p[1]-1, +p[2]); return (+p[0]) + "/" + (+p[1]) + "/" + (+p[2]) + "(" + WD[dt.getDay()] + ")"; }
  function parseAmount(s) { var n = Math.round(Number(String(s).replace(/[^0-9.-]/g, ""))); return isNaN(n) ? 0 : n; }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]; }); }
  function el(html) { var t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstChild; }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

  function periodStart(d, sd) {
    var y = d.getFullYear(), m = d.getMonth(), day = d.getDate();
    return (day >= sd) ? new Date(y, m, sd) : new Date(y, m - 1, sd);
  }
  function periodEnd(start, sd) { return new Date(start.getFullYear(), start.getMonth() + 1, sd); }

  /* ---------- state ---------- */
  var now = new Date();
  var state = {
    accounts: [],
    txs: [],
    active: "home",     // home | history | search | stats | settings
    lastMain: "home",
    cursor: periodStart(now, 1),
    startDay: 1,
    budget: 0,
    statsYear: now.getFullYear(),
    adding: false,
    addType: "transfer",
    editingId: null,
    searchQuery: ""
  };
  var MAIN_KEYS = ["home", "history"];

  function accById(id) { return state.accounts.find(function (a) { return a.id === id; }); }
  function accName(id) { var a = accById(id); return a ? a.name : "（削除済み）"; }
  function accsOfType(t) { return state.accounts.filter(function (a) { return a.type === t; }); }
  function nonCardAccs() { return state.accounts.filter(function (a) { return a.type !== "card"; }); }
  function assetAccs() { return state.accounts.filter(function (a) { return a.type === "bank" || a.type === "cash" || a.type === "emoney"; }); }
  function sortAccounts() {
    state.accounts.sort(function (a, b) {
      var oa = (typeof a.order === "number") ? a.order : 1e9, ob = (typeof b.order === "number") ? b.order : 1e9;
      if (oa !== ob) return oa - ob;
      return (a.createdAt || 0) - (b.createdAt || 0);
    });
  }
  function ensureOrder() {
    state.accounts.forEach(function (a, i) { if (typeof a.order !== "number") { a.order = i; dbPut(ACC, a); } });
  }
  function moveAccount(id, dir) {
    sortAccounts();
    var i = state.accounts.findIndex(function (a) { return a.id === id; });
    var j = i + dir;
    if (i < 0 || j < 0 || j >= state.accounts.length) return;
    var a = state.accounts[i], b = state.accounts[j];
    var tmp = a.order; a.order = b.order; b.order = tmp;
    dbPut(ACC, a); dbPut(ACC, b);
    sortAccounts();
    renderSettings();
  }

  /* ---------- 残高計算 ---------- */
  function balances() {
    var map = {};
    state.accounts.forEach(function (a) { map[a.id] = a.initBalance || 0; });
    state.txs.forEach(function (t) {
      var amt = t.amount || 0;
      if (t.type === "income") { if (map[t.toId] != null) map[t.toId] += amt; }
      else if (t.type === "transfer") { if (map[t.fromId] != null) map[t.fromId] -= amt; if (map[t.toId] != null) map[t.toId] += amt; }
      else if (t.type === "expense") {
        var a = accById(t.fromId);
        if (map[t.fromId] != null) map[t.fromId] += (a && a.type === "card") ? amt : -amt;
      }
      else if (t.type === "cardpay") { if (map[t.fromId] != null) map[t.fromId] -= amt; if (map[t.toId] != null) map[t.toId] -= amt; }
      else if (t.type === "adjust") { if (map[t.toId] != null) map[t.toId] += amt; }
    });
    return map;
  }
  function walletTotal(bal) {
    var s = 0;
    state.accounts.forEach(function (a) { if (a.wallet && !a.hidden && a.type !== "card") s += (bal[a.id] || 0); });
    return s;
  }
  function periodVarExpense() {
    var start = state.cursor, end = periodEnd(start, state.startDay), s = 0;
    state.txs.forEach(function (t) {
      if (t.type === "expense" && !t.fixed && t.date) {
        var dt = dateFromISO(t.date);
        if (dt >= start && dt < end) s += (t.amount || 0);
      }
    });
    return s;
  }

  /* ---------- 履歴の集合 ---------- */
  function periodTxs() {
    var start = state.cursor, end = periodEnd(start, state.startDay);
    return state.txs.filter(function (t) {
      if (!t.date) return false;
      var dt = dateFromISO(t.date);
      return dt >= start && dt < end;
    }).sort(function (x, y) { return x.date === y.date ? (y.createdAt - x.createdAt) : (x.date < y.date ? 1 : -1); });
  }
  function usedCategories() {
    var set = {};
    CAT_DEFAULTS.forEach(function (c) { set[c] = 1; });
    state.txs.forEach(function (t) { if (t.type === "expense" && t.category) set[t.category] = 1; });
    return Object.keys(set);
  }

  /* ---------- DOM ---------- */
  var root = document.getElementById("root");
  var secBtns = {}, tabBtns = {};
  var scrollTabEl, homeEl, histNav, histMonthLabel, histList, addArea;
  var searchEl, searchInput, clearBtn, searchResults, statsEl, settingsEl;

  function buildShell() {
    var col = el('<div class="col"></div>');

    var header = el('<div class="header"></div>');
    var hbody = el('<div style="flex:1;min-width:0"></div>');
    hbody.appendChild(el('<h1 class="title">家計簿</h1>'));
    var sub = el('<p class="subdate"></p>');
    sub.textContent = new Date().toLocaleDateString("ja-JP", { year: "numeric", month: "long", day: "numeric", weekday: "long" });
    hbody.appendChild(sub);
    header.appendChild(hbody);
    var sectabs = el('<div class="sectabs"></div>');
    [["main","ホーム"],["search","検索"],["stats","統計"],["settings","設定"]].forEach(function (p) {
      var b = el('<button class="sectab">' + p[1] + '</button>');
      b.onclick = function () { setActive(p[0] === "main" ? state.lastMain : p[0]); };
      secBtns[p[0]] = b; sectabs.appendChild(b);
    });
    header.appendChild(sectabs);
    col.appendChild(header);

    scrollTabEl = el('<div class="scrolltab"></div>');
    [["home","ホーム"],["history","履歴"]].forEach(function (p) {
      var b = el('<button class="tab">' + p[1] + '</button>');
      b.onclick = function () { setActive(p[0]); };
      tabBtns[p[0]] = b; scrollTabEl.appendChild(b);
    });
    col.appendChild(scrollTabEl);

    addArea = el('<div></div>');
    col.appendChild(addArea);

    homeEl = el('<div></div>');
    col.appendChild(homeEl);

    var hist = el('<div></div>');
    histNav = el('<div class="monthnav"></div>');
    var prev = el('<button class="nb">\u2039</button>');
    var next = el('<button class="nb">\u203A</button>');
    histMonthLabel = el('<div class="mlabel"></div>');
    prev.onclick = function () { closeForms(); state.cursor = new Date(state.cursor.getFullYear(), state.cursor.getMonth() - 1, state.startDay); renderView(); };
    next.onclick = function () { closeForms(); state.cursor = new Date(state.cursor.getFullYear(), state.cursor.getMonth() + 1, state.startDay); renderView(); };
    histNav.appendChild(prev); histNav.appendChild(histMonthLabel); histNav.appendChild(next);
    hist.appendChild(histNav);
    histList = el('<div></div>');
    hist.appendChild(histList);
    hist.style.display = "none";
    col.appendChild(hist);
    homeEl._histWrap = hist;

    // 検索ページ
    searchEl = el('<div style="display:none"></div>');
    var scard = el('<div class="card searchcard"></div>');
    var scpad = el('<div class="cardpad"></div>');
    searchInput = el('<input class="searchinp" type="text" placeholder="すべての記録を検索" enterkeyhint="search" autocomplete="off" />');
    clearBtn = el('<button class="clr">\u2715</button>');
    searchInput.addEventListener("input", function () {
      state.searchQuery = searchInput.value;
      clearBtn.style.display = searchInput.value ? "flex" : "none";
      renderSearchResults();
    });
    clearBtn.onclick = function () { searchInput.value = ""; state.searchQuery = ""; clearBtn.style.display = "none"; renderSearchResults(); searchInput.focus(); };
    scpad.appendChild(searchInput); scpad.appendChild(clearBtn);
    scard.appendChild(scpad);
    searchResults = el('<div></div>');
    searchEl.appendChild(scard); searchEl.appendChild(searchResults);
    col.appendChild(searchEl);

    statsEl = el('<div style="display:none"></div>');
    col.appendChild(statsEl);
    settingsEl = el('<div style="display:none"></div>');
    col.appendChild(settingsEl);

    root.appendChild(col);
  }

  function closeForms() { state.adding = false; state.editingId = null; }
  function setActive(key) {
    closeForms();
    state.active = key;
    if (MAIN_KEYS.indexOf(key) >= 0) state.lastMain = key;
    renderView();
  }

  function renderView() {
    var isMain = MAIN_KEYS.indexOf(state.active) >= 0;
    scrollTabEl.style.display = isMain ? "" : "none";
    addArea.style.display = isMain ? "" : "none";
    homeEl.style.display = state.active === "home" ? "" : "none";
    homeEl._histWrap.style.display = state.active === "history" ? "" : "none";
    searchEl.style.display = state.active === "search" ? "" : "none";
    statsEl.style.display = state.active === "stats" ? "" : "none";
    settingsEl.style.display = state.active === "settings" ? "" : "none";

    secBtns.main.classList.toggle("active", isMain);
    secBtns.search.classList.toggle("active", state.active === "search");
    secBtns.stats.classList.toggle("active", state.active === "stats");
    secBtns.settings.classList.toggle("active", state.active === "settings");
    if (isMain) MAIN_KEYS.forEach(function (k) { tabBtns[k].classList.toggle("active", k === state.active); });

    if (isMain) { renderAddArea(); if (state.active === "home") renderHome(); else renderHistory(); }
    else if (state.active === "search") { renderSearchResults(); searchInput.focus(); }
    else if (state.active === "stats") renderStats();
    else if (state.active === "settings") renderSettings();
  }

  /* ---------- 記録フォーム ---------- */
  function renderAddArea() {
    addArea.innerHTML = "";
    if (!state.adding) {
      var b = el('<button class="addbtn">＋ 記録する</button>');
      b.onclick = function () {
        if (!state.accounts.length) { setActive("settings"); return; }
        state.adding = true; renderAddArea();
      };
      addArea.appendChild(b);
      return;
    }
    var card = el('<div class="card"></div>');
    var pad = el('<div class="formpad"></div>');

    var tsel = el('<div class="typesel"></div>');
    TXTYPES.forEach(function (t) {
      var p = el('<button class="typepill">' + t.label + '</button>');
      if (t.key === state.addType) { p.classList.add("active"); p.style.background = t.dim; }
      p.onclick = function () { state.addType = t.key; renderAddArea(); };
      tsel.appendChild(p);
    });
    pad.appendChild(tsel);

    var form = buildTxForm({
      type: state.addType, tx: null, submitLabel: "記録",
      onSave: function (tx) {
        state.txs.push(tx); dbPut(TX, tx);
        state.adding = false; renderView();
      },
      onCancel: function () { state.adding = false; renderAddArea(); }
    });
    pad.appendChild(form);
    card.appendChild(pad);
    addArea.appendChild(card);
  }

  function accSelect(list, selectedId, placeholder) {
    var sel = el('<select class="fsel"></select>');
    sel.appendChild(el('<option value="">' + esc(placeholder || "選択してください") + '</option>'));
    list.forEach(function (a) {
      var o = el('<option value="' + esc(a.id) + '">' + esc(a.name) + '（' + accTypeOf(a.type).label + '）</option>');
      if (a.id === selectedId) o.setAttribute("selected", "");
      sel.appendChild(o);
    });
    return sel;
  }

  function buildTxForm(opts) {
    var type = opts.type, tx = opts.tx;
    var tdef = txTypeOf(type);
    var wrap = el('<div></div>');
    var bal = balances();

    var start = state.cursor, end = periodEnd(start, state.startDay);
    var t0 = new Date(); t0.setHours(0,0,0,0);
    var defDate = tx ? tx.date : ((state.active !== "history" || (t0 >= start && t0 < end)) ? todayStr() : isoOf(start));

    var row1 = el('<div class="frow"></div>');
    var df = el('<div class="ffield"><div class="flabel">日付</div></div>');
    var dateInp = el('<input class="finp" type="date" />'); dateInp.value = defDate;
    df.appendChild(dateInp); row1.appendChild(df);

    var amtInp = null;
    if (type !== "adjust") {
      var af = el('<div class="ffield amt"><div class="flabel">金額</div></div>');
      amtInp = el('<input class="finp amt" type="number" inputmode="numeric" placeholder="0" />');
      if (tx && tx.amount) amtInp.value = tx.amount;
      af.appendChild(amtInp); row1.appendChild(af);
    }
    wrap.appendChild(row1);

    var fromSel = null, toSel = null, catInp = null, fixedChk = null, impChk = null, actualInp = null, adjNote = null;

    function fieldRow(label, node) {
      var f = el('<div class="ffield" style="margin-bottom:12px"><div class="flabel">' + label + '</div></div>');
      f.appendChild(node); return f;
    }

    if (type === "income") {
      toSel = accSelect(assetAccs(), tx ? tx.toId : "", "入金先の口座");
      wrap.appendChild(fieldRow("入金先", toSel));
    } else if (type === "transfer") {
      fromSel = accSelect(nonCardAccs(), tx ? tx.fromId : "", "出金元の口座");
      toSel = accSelect(nonCardAccs(), tx ? tx.toId : "", "入金先の口座");
      wrap.appendChild(fieldRow("出金元", fromSel));
      wrap.appendChild(fieldRow("入金先（チャージ先）", toSel));
    } else if (type === "expense") {
      fromSel = accSelect(state.accounts, tx ? tx.fromId : "", "支払いに使った口座");
      wrap.appendChild(fieldRow("支払い", fromSel));
      catInp = el('<input class="finp" type="text" list="catlist" placeholder="食費、日用品 など" />');
      if (tx) catInp.value = tx.category || "";
      var dl = el('<datalist id="catlist"></datalist>');
      usedCategories().forEach(function (c) { dl.appendChild(el('<option value="' + esc(c) + '"></option>')); });
      var cf = fieldRow("項目", catInp); cf.appendChild(dl);
      wrap.appendChild(cf);
      var checks = el('<div class="fchecks"></div>');
      var l1 = el('<label class="fcheck"><input type="checkbox" />固定費</label>');
      var l2 = el('<label class="fcheck"><input type="checkbox" />重要（記憶しておく）</label>');
      fixedChk = l1.querySelector("input"); impChk = l2.querySelector("input");
      if (tx) { fixedChk.checked = !!tx.fixed; impChk.checked = !!tx.important; }
      checks.appendChild(l1); checks.appendChild(l2);
      wrap.appendChild(checks);
    } else if (type === "cardpay") {
      var banks = accsOfType("bank");
      fromSel = accSelect(banks.length ? banks : nonCardAccs(), tx ? tx.fromId : "", "引き落とし口座");
      toSel = accSelect(accsOfType("card"), tx ? tx.toId : "", "カード");
      wrap.appendChild(fieldRow("引き落とし口座", fromSel));
      wrap.appendChild(fieldRow("カード", toSel));
    } else if (type === "adjust") {
      toSel = accSelect(state.accounts, tx ? tx.toId : "", "調整する口座");
      wrap.appendChild(fieldRow("口座", toSel));
      if (!tx) {
        actualInp = el('<input class="finp amt" type="number" inputmode="numeric" placeholder="0" />');
        wrap.appendChild(fieldRow("実際の残高", actualInp));
        adjNote = el('<p class="fnote"></p>');
        wrap.appendChild(adjNote);
        function updAdj() {
          var a = accById(toSel.value);
          if (!a) { adjNote.textContent = ""; return; }
          var cur = bal[a.id] || 0;
          var v = parseAmount(actualInp.value);
          adjNote.textContent = "現在の残高 " + yen(cur) + (actualInp.value !== "" ? (" → 調整 " + yenSigned(v - cur)) : "");
        }
        toSel.addEventListener("change", updAdj);
        actualInp.addEventListener("input", updAdj);
        updAdj();
      } else {
        wrap.appendChild(el('<p class="fnote">調整額：' + yenSigned(tx.amount) + '（金額の変更はこの記録を削除して調整し直してください）</p>'));
      }
    }

    var memoInp = el('<textarea class="ftext" rows="2" placeholder="メモ（任意）"></textarea>');
    if (tx) memoInp.value = tx.memo || "";
    wrap.appendChild(memoInp);

    var btns = el('<div class="fbtns"></div>');
    if (opts.onDelete) { var d = el('<button class="fbtn del">削除</button>'); d.onclick = opts.onDelete; btns.appendChild(d); }
    var c = el('<button class="fbtn cancel">キャンセル</button>'); c.onclick = opts.onCancel; btns.appendChild(c);
    var s = el('<button class="fbtn save">' + opts.submitLabel + '</button>'); s.style.background = tdef.color;
    s.onclick = function () {
      var date = dateInp.value || defDate;
      var memo = memoInp.value.trim();
      var out;
      if (type === "income") {
        if (!toSel.value) { toSel.focus(); return; }
        var a1 = parseAmount(amtInp.value); if (a1 <= 0) { amtInp.focus(); return; }
        out = { type: "income", toId: toSel.value, amount: a1 };
      } else if (type === "transfer") {
        if (!fromSel.value) { fromSel.focus(); return; }
        if (!toSel.value || toSel.value === fromSel.value) { toSel.focus(); return; }
        var a2 = parseAmount(amtInp.value); if (a2 <= 0) { amtInp.focus(); return; }
        out = { type: "transfer", fromId: fromSel.value, toId: toSel.value, amount: a2 };
      } else if (type === "expense") {
        if (!fromSel.value) { fromSel.focus(); return; }
        var a3 = parseAmount(amtInp.value); if (a3 <= 0) { amtInp.focus(); return; }
        out = { type: "expense", fromId: fromSel.value, amount: a3, category: catInp.value.trim(), fixed: fixedChk.checked, important: impChk.checked };
      } else if (type === "cardpay") {
        if (!fromSel.value) { fromSel.focus(); return; }
        if (!toSel.value) { toSel.focus(); return; }
        var a4 = parseAmount(amtInp.value); if (a4 <= 0) { amtInp.focus(); return; }
        out = { type: "cardpay", fromId: fromSel.value, toId: toSel.value, amount: a4 };
      } else if (type === "adjust") {
        if (!toSel.value) { toSel.focus(); return; }
        if (tx) { out = { type: "adjust", toId: toSel.value, amount: tx.amount }; }
        else {
          if (actualInp.value === "") { actualInp.focus(); return; }
          var cur = bal[toSel.value] || 0;
          var delta = parseAmount(actualInp.value) - cur;
          out = { type: "adjust", toId: toSel.value, amount: delta };
        }
      }
      out.id = tx ? tx.id : uid();
      out.date = date; out.memo = memo;
      out.createdAt = tx ? tx.createdAt : Date.now();
      opts.onSave(out);
    };
    btns.appendChild(s);
    wrap.appendChild(btns);
    return wrap;
  }

  /* ---------- ホーム ---------- */
  function renderHome() {
    homeEl.innerHTML = "";
    var bal = balances();

    if (!state.accounts.length) {
      var g = el('<div class="card"><div class="formpad"><p class="confirmtext">まず「設定」から口座（銀行・現金・電子マネー・カード・貸し借り）を追加して、現在の残高を入れてください。</p></div></div>');
      var gb = el('<button class="sbtn" style="margin:0 16px 14px;width:calc(100% - 32px)">設定を開く</button>');
      gb.onclick = function () { setActive("settings"); };
      g.appendChild(gb);
      homeEl.appendChild(g);
      return;
    }

    // 生活費予算（変動費で減る）／なければ残高
    var wallets = state.accounts.filter(function (a) { return a.wallet && !a.hidden && a.type !== "card"; });
    var wcard = el('<div class="card"></div>');
    var wpad = el('<div class="cardpad"></div>');
    var wbar = el('<div class="bar" style="min-height:42px;background:#b8dda0"></div>');
    var wbody = el('<div class="body"></div>');
    var walletBal = walletTotal(bal);
    if (state.budget > 0) {
      var spent = periodVarExpense();
      var left = state.budget - spent;
      wbody.appendChild(el('<div class="seclbl" style="margin:0 0 6px">生活費予算のこり</div>'));
      wbody.appendChild(el('<div class="total">' + yen(left) + '<small>/ 予算 ' + yen(state.budget) + '</small></div>'));
      var pct = Math.max(0, Math.min(100, Math.round(left / state.budget * 100)));
      var barI = el('<div class="budgetbar"><div style="width:' + pct + '%"></div></div>');
      if (left <= 0) barI.querySelector("div").style.background = "#f2c0d8";
      else if (left / state.budget < 0.2) barI.querySelector("div").style.background = "#fbd5ac";
      wbody.appendChild(barI);
      wbody.appendChild(el('<div class="subnote">このサイクルの変動費 ' + yen(spent) + (wallets.length ? '　｜　生活費残高 ' + yen(walletBal) : '') + '</div>'));
    } else {
      wbody.appendChild(el('<div class="seclbl" style="margin:0 0 6px">生活費のこり</div>'));
      if (!wallets.length) {
        wbody.appendChild(el('<p class="confirmtext" style="margin:0">設定で予算を決めると、変動費で減るバーを表示します。口座編集の「生活費に含める」で残高合計も出せます。</p>'));
      } else {
        wbody.appendChild(el('<div class="total">' + yen(walletBal) + '</div>'));
        wbody.appendChild(el('<div class="subnote">' + wallets.map(function (a) { return esc(a.name) + " " + yen(bal[a.id] || 0); }).join("　") + '</div>'));
      }
    }
    wpad.appendChild(wbar); wpad.appendChild(wbody); wcard.appendChild(wpad);
    homeEl.appendChild(wcard);

    // 口座残高（種類ごと）
    ACCTYPES.forEach(function (at) {
      var list = accsOfType(at.key).filter(function (a) { return !a.hidden; });
      if (!list.length) return;
      var card = el('<div class="card"></div>');
      var pad = el('<div class="cardpad"></div>');
      var barColor = at.key === "card" ? "#fbd5ac" : (at.key === "bank" ? "#c2d8f0" : (at.key === "cash" ? "#b8dda0" : (at.key === "loan" ? "#d9d9d9" : "#f2c0d8")));
      var bar = el('<div class="bar" style="min-height:42px"></div>'); bar.style.background = barColor;
      var body = el('<div class="body"></div>');
      body.appendChild(el('<div class="seclbl" style="margin:0 0 4px">' + at.label + (at.key === "card" ? '（未払い）' : '') + '</div>'));
      list.forEach(function (a) {
        var row = el('<div class="accrow"></div>');
        row.appendChild(el('<span class="accname">' + esc(a.name) + '</span>'));
        if (a.wallet && a.type !== "card") row.appendChild(el('<span class="wtag">生活費</span>'));
        var v = bal[a.id] || 0;
        if (at.key === "loan" && v !== 0) {
          row.appendChild(el('<span class="rtag2" style="margin-left:auto;flex-shrink:0;background:' + (v > 0 ? "rgba(184,221,160,0.45)" : "rgba(242,192,216,0.45)") + '">' + (v > 0 ? "貸し" : "借り") + '</span>'));
          row.appendChild(el('<span class="accbal" style="margin-left:8px">' + yen(Math.abs(v)) + '</span>'));
        } else {
          row.appendChild(el('<span class="accbal">' + yen(v) + '</span>'));
        }
        body.appendChild(row);
        if (a.type === "card" && a.payDay) {
          body.appendChild(el('<div class="subnote">毎月' + a.payDay + '日ごろ引き落とし' + (a.payFrom ? '（' + esc(accName(a.payFrom)) + '）' : '') + '</div>'));
        }
      });
      pad.appendChild(bar); pad.appendChild(body); card.appendChild(pad);
      homeEl.appendChild(card);
    });
  }

  /* ---------- 履歴 ---------- */
  function renderHistMonth() {
    var sd = state.startDay, start = state.cursor, end = periodEnd(start, sd);
    var t = new Date(); t.setHours(0, 0, 0, 0);
    var isThis = (t >= start && t < end);
    var html = '<span>' + start.getFullYear() + "年" + (start.getMonth() + 1) + "月</span>" + (isThis ? '<small>今月</small>' : "");
    if (sd !== 1) {
      var last = new Date(end.getTime() - 86400000);
      html += '<div style="font-size:10px;color:rgba(0,0,0,0.3);margin-top:1px">' + (start.getMonth() + 1) + '/' + start.getDate() + '〜' + (last.getMonth() + 1) + '/' + last.getDate() + '</div>';
    }
    histMonthLabel.innerHTML = html;
  }

  function txCard(t, opts) {
    var tdef = txTypeOf(t.type);
    var card = el('<div class="card"' + (opts && opts.clickable ? ' style="cursor:pointer"' : '') + '></div>');
    var pad = el('<div class="cardpad"></div>');
    var bar = el('<div class="bar"></div>'); bar.style.background = tdef.color;
    var body = el('<div class="body"></div>');

    var top = el('<div class="toprow"></div>');
    var tag = el('<span class="rtag">' + tdef.label + '</span>'); tag.style.background = tdef.dim;
    top.appendChild(tag);
    if (t.type === "expense" && t.fixed) top.appendChild(el('<span class="rtag2">固定</span>'));
    if (t.type === "expense" && t.important) top.appendChild(el('<span class="rtag2">★</span>'));
    top.appendChild(el('<span class="rdate">' + (opts && opts.fullDate ? fmtDateFull(t.date) : fmtDate(t.date)) + '</span>'));
    top.appendChild(el('<div class="grow"></div>'));
    var amtStr = t.type === "adjust" ? yenSigned(t.amount) : yen(t.amount);
    top.appendChild(el('<span class="ramt">' + amtStr + '</span>'));
    if (opts && opts.onEdit) {
      var eb = el('<button class="editbtn">編集</button>');
      eb.onclick = function (ev) { ev.stopPropagation(); opts.onEdit(); };
      top.appendChild(eb);
    }
    body.appendChild(top);

    var line = "";
    if (t.type === "income") line = "→ " + esc(accName(t.toId));
    else if (t.type === "transfer") line = esc(accName(t.fromId)) + " → " + esc(accName(t.toId));
    else if (t.type === "expense") line = esc(accName(t.fromId)) + (t.category ? "　" + esc(t.category) : "");
    else if (t.type === "cardpay") line = esc(accName(t.fromId)) + " → " + esc(accName(t.toId));
    else if (t.type === "adjust") line = esc(accName(t.toId));
    if (line) body.appendChild(el('<div class="rparty">' + line + '</div>'));
    if (t.memo) body.appendChild(el('<div class="rmemo">' + esc(t.memo) + '</div>'));

    pad.appendChild(bar); pad.appendChild(body); card.appendChild(pad);
    if (opts && opts.clickable && opts.onClick) card.onclick = opts.onClick;
    return card;
  }

  function renderHistory() {
    renderHistMonth();
    var list = periodTxs();
    histList.innerHTML = "";
    if (!list.length) {
      histList.appendChild(el('<div class="empty">この期間の記録はありません</div>'));
      return;
    }
    list.forEach(function (t) {
      if (state.editingId === t.id) {
        var card = el('<div class="card"></div>');
        var pad = el('<div class="formpad"></div>');
        pad.appendChild(el('<div class="seclbl" style="margin:0 0 10px">' + txTypeOf(t.type).label + 'を編集</div>'));
        pad.appendChild(buildTxForm({
          type: t.type, tx: t, submitLabel: "保存",
          onSave: function (nt) {
            var i = state.txs.findIndex(function (x) { return x.id === t.id; });
            if (i >= 0) state.txs[i] = nt;
            dbPut(TX, nt);
            state.editingId = null; renderView();
          },
          onCancel: function () { state.editingId = null; renderHistory(); },
          onDelete: function () {
            dbDel(TX, t.id).then(function () {
              state.txs = state.txs.filter(function (x) { return x.id !== t.id; });
              state.editingId = null; renderView();
            });
          }

  /* ---------- 検索 ---------- */
  function renderSearchResults() {
    var q = state.searchQuery.trim().toLowerCase();
    searchResults.innerHTML = "";
    if (!q) {
      searchResults.appendChild(el('<div class="empty">キーワードを入力すると、すべての記録から検索します</div>'));
      return;
    }
    var hits = state.txs.filter(function (t) {
      var names = [accName(t.fromId || ""), accName(t.toId || "")].join(" ").toLowerCase();
      return (t.memo || "").toLowerCase().indexOf(q) >= 0 ||
             (t.category || "").toLowerCase().indexOf(q) >= 0 ||
             String(t.amount).indexOf(q) >= 0 ||
             names.indexOf(q) >= 0 ||
             txTypeOf(t.type).label.indexOf(q) >= 0;
    }).sort(function (a, b) { return a.date === b.date ? b.createdAt - a.createdAt : (a.date < b.date ? 1 : -1); });
    if (!hits.length) {
      searchResults.appendChild(el('<div class="empty">該当する記録はありません</div>'));
      return;
    }
    searchResults.appendChild(el('<div class="seclbl" style="margin:2px 2px 8px">' + hits.length + '件</div>'));
    hits.forEach(function (t) {
      searchResults.appendChild(txCard(t, {
        fullDate: true, clickable: true,
        onClick: function () {
          closeForms();

  /* ---------- 統計 ---------- */
  function renderStats() {
    statsEl.innerHTML = "";
    var sd = state.startDay;
    if (!state.statsCursor) state.statsCursor = periodStart(new Date(), sd);
    var sc = state.statsCursor;
    var selYear = sc.getFullYear(), selMonth = sc.getMonth();
    function periodKey(t) { var ps = periodStart(dateFromISO(t.date), sd); return { y: ps.getFullYear(), m: ps.getMonth() }; }

    // 月ナビ（‹ › で前後、ラベルの年・月プルダウンで自由移動）
    var nav = el('<div class="monthnav"></div>');
    var prev = el('<button class="nb">\u2039</button>');
    var next = el('<button class="nb">\u203A</button>');
    var end = periodEnd(sc, sd), last = new Date(end.getTime() - 86400000);
    var lbl = el('<div class="mlabel"></div>');
    var picker = el('<div style="display:flex;align-items:center;justify-content:center;gap:2px"></div>');
    var minY = selYear - 5, maxY = new Date().getFullYear();
    state.txs.forEach(function (t) { if (t.date) { var y = +t.date.slice(0, 4); if (y < minY) minY = y; } });
    var ysel = el('<select class="statsel"></select>');
    for (var yy = maxY; yy >= minY; yy--) { var yo = el('<option value="' + yy + '">' + yy + '</option>'); if (yy === selYear) yo.setAttribute("selected", ""); ysel.appendChild(yo); }
    var msel = el('<select class="statsel"></select>');
    for (var mm = 0; mm < 12; mm++) { var mo = el('<option value="' + mm + '">' + (mm + 1) + '</option>'); if (mm === selMonth) mo.setAttribute("selected", ""); msel.appendChild(mo); }
    picker.appendChild(ysel); picker.appendChild(el('<span style="font-size:12px;color:rgba(0,0,0,0.5)">年</span>'));
    picker.appendChild(msel); picker.appendChild(el('<span style="font-size:12px;color:rgba(0,0,0,0.5)">月</span>'));
    ysel.onchange = function () { state.statsCursor = new Date(+ysel.value, selMonth, sd); renderStats(); };
    msel.onchange = function () { state.statsCursor = new Date(selYear, +msel.value, sd); renderStats(); };
    lbl.appendChild(picker);
    if (sd !== 1) lbl.appendChild(el('<div style="font-size:10px;color:rgba(0,0,0,0.3);margin-top:1px">' + (sc.getMonth() + 1) + '/' + sc.getDate() + '〜' + (last.getMonth() + 1) + '/' + last.getDate() + '</div>'));
    prev.onclick = function () { state.statsCursor = new Date(selYear, selMonth - 1, sd); renderStats(); };
    next.onclick = function () { state.statsCursor = new Date(selYear, selMonth + 1, sd); renderStats(); };
    nav.appendChild(prev); nav.appendChild(lbl); nav.appendChild(next);
    statsEl.appendChild(nav);

    // 収入・支出の月別棒グラフ（選択月の年・選択月を強調）
    [{ key: "income", label: "収入", color: "#c2d8f0" }, { key: "expense", label: "支出", color: "#f2c0d8" }].forEach(function (def) {
      var totals = new Array(12).fill(0);
      state.txs.forEach(function (t) {
        if (t.type !== def.key || !t.date) return;
        var pk = periodKey(t);
        if (pk.y === selYear) totals[pk.m] += (t.amount || 0);
      });
      var max = Math.max.apply(null, totals.concat([1]));
      var monthVal = totals[selMonth];

      var card = el('<div class="card"></div>');
      var pad = el('<div class="cardpad"></div>');
      var bar = el('<div class="bar" style="min-height:42px"></div>'); bar.style.background = def.color;
      var body = el('<div class="body"></div>');
      body.appendChild(el('<div class="seclbl" style="margin:0 0 4px">' + def.label + '（' + (selMonth + 1) + '月）</div>'));
      body.appendChild(el('<div class="total" style="font-size:22px">' + yen(monthVal) + '<small>' + selYear + '年 月別</small></div>'));
      var read = el('<div class="statread"></div>');
      read.textContent = "棒をタップで各月の額（水色＝選択中の月）";
      var bars = el('<div class="statbars"></div>');
      totals.forEach(function (v, i) {
        var colEl = el('<div class="statcol"></div>');
        var b = el('<div class="statbar"></div>');
        var isSel = (i === selMonth);
        if (v > 0) { b.style.background = isSel ? "#7fb0d8" : def.color; b.style.height = Math.max(3, Math.round(v / max * 50)) + "px"; }
        else { b.style.background = isSel ? "rgba(127,176,216,0.5)" : "rgba(0,0,0,0.06)"; b.style.height = isSel ? "3px" : "1px"; }
        colEl.onclick = function () { state.statsCursor = new Date(selYear, i, sd); renderStats(); };
        colEl.appendChild(b); bars.appendChild(colEl);
      });
      var labels = el('<div class="statlabels"></div>');
      for (var m2 = 1; m2 <= 12; m2++) { var lb = el('<div class="statlabel">' + m2 + '</div>'); if (m2 - 1 === selMonth) { lb.style.color = "rgba(0,0,0,0.55)"; lb.style.fontWeight = "700"; } labels.appendChild(lb); }
      body.appendChild(read); body.appendChild(bars); body.appendChild(labels);
      pad.appendChild(bar); pad.appendChild(body); card.appendChild(pad);
      statsEl.appendChild(card);
    });

    // 支出の内訳（選択月・項目別・固定/変動）
    var exp = state.txs.filter(function (t) { if (t.type !== "expense" || !t.date) return false; var pk = periodKey(t); return pk.y === selYear && pk.m === selMonth; });
    var card2 = el('<div class="card"></div>');
    var pad2 = el('<div class="cardpad"></div>');
    var bar2 = el('<div class="bar" style="min-height:42px;background:#f2c0d8"></div>');
    var body2 = el('<div class="body"></div>');
    body2.appendChild(el('<div class="seclbl" style="margin:0 0 4px">支出の内訳（' + (selMonth + 1) + '月）</div>'));
    if (!exp.length) {
      body2.appendChild(el('<div class="empty" style="padding:14px 0">この月に記録された支出はありません</div>'));
    } else {
      var fixedSum = 0, varSum = 0, catMap = {};
      exp.forEach(function (t) {
        if (t.fixed) fixedSum += t.amount; else varSum += t.amount;
        var k = t.category || "（項目なし）";
        catMap[k] = (catMap[k] || 0) + t.amount;
      });
      body2.appendChild(el('<div class="bdrow"><span class="bdname">固定費</span><span class="bdamt">' + yen(fixedSum) + '</span></div>'));
      body2.appendChild(el('<div class="bdrow"><span class="bdname">変動費</span><span class="bdamt">' + yen(varSum) + '</span></div>'));
      var bd = el('<div class="breakline"></div>');
      Object.keys(catMap).map(function (k) { return [k, catMap[k]]; })
        .sort(function (a, b) { return b[1] - a[1]; })
        .forEach(function (r) { bd.appendChild(el('<div class="bdrow"><span class="bdname">' + esc(r[0]) + '</span><span class="bdamt">' + yen(r[1]) + '</span></div>')); });
      body2.appendChild(bd);
      body2.appendChild(el('<div class="subnote" style="margin-top:8px">※記録した支出のみ。記録していない生活費は含みません</div>'));
    }
    pad2.appendChild(bar2); pad2.appendChild(body2); card2.appendChild(pad2);
    statsEl.appendChild(card2);

    // ★ 重要な支出（選択月）
    var imp = state.txs.filter(function (t) { if (t.type !== "expense" || !t.important || !t.date) return false; var pk = periodKey(t); return pk.y === selYear && pk.m === selMonth; })
      .sort(function (a, b) { return a.date === b.date ? b.createdAt - a.createdAt : (a.date < b.date ? 1 : -1); });
    if (imp.length) {
      var card3 = el('<div class="card"></div>');
      var pad3 = el('<div class="cardpad"></div>');
      var bar3 = el('<div class="bar" style="min-height:42px;background:#f2c0d8"></div>');
      var body3 = el('<div class="body"></div>');
      var impTotal = imp.reduce(function (s, t) { return s + (t.amount || 0); }, 0);
      body3.appendChild(el('<div class="seclbl" style="margin:0 0 6px">重要な支出（' + (selMonth + 1) + '月 / ' + imp.length + '件 ' + yen(impTotal) + '）</div>'));
      imp.forEach(function (t) {
        var row = el('<div class="bdrow" style="align-items:flex-start"></div>');
        var left = el('<div style="min-width:0;flex:1"></div>');
        var p = t.date.split("-");
        var head = (+p[1]) + "/" + (+p[2]) + (t.category ? "　" + esc(t.category) : "");
        left.appendChild(el('<div class="bdname" style="white-space:normal">★ ' + head + '</div>'));
        if (t.memo) left.appendChild(el('<div class="rmemo" style="margin-top:1px">' + esc(t.memo) + '</div>'));
        row.appendChild(left);
        row.appendChild(el('<span class="bdamt">' + yen(t.amount) + '</span>'));
        body3.appendChild(row);
      });
      pad3.appendChild(bar3); pad3.appendChild(body3); card3.appendChild(pad3);
      statsEl.appendChild(card3);
    }
  }

  /* ---------- 設定 ---------- */
  var acctFormOpen = null; // "new" | account id | null

  function exportData() {
    var json = JSON.stringify({ app: "kakeibo", version: 2, exportedAt: new Date().toISOString(), settings: { startDay: state.startDay, budget: state.budget }, accounts: state.accounts, txs: state.txs }, null, 2);
    var fn = "kakeibo-backup-" + todayStr() + ".json";
    try {
      if (navigator.canShare) {
        var f = new File([json], fn, { type: "application/json" });
        if (navigator.canShare({ files: [f] })) { navigator.share({ files: [f] }).catch(function () {}); return; }
      }
    } catch (e) {}
    var a = document.createElement("a");
    a.href = "data:application/json;charset=utf-8," + encodeURIComponent(json);
    a.download = fn;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

  function importData(parsed, done) {
    if (!parsed || parsed.version !== 2 || !Array.isArray(parsed.accounts) || !Array.isArray(parsed.txs)) {
      alert("対応していないファイルです（この版のバックアップのみ復元できます）");
      return;
    }
    var accs = parsed.accounts.filter(function (a) { return a && a.id && a.name && accTypeOf(a.type); });
    var txs = parsed.txs.filter(function (t) { return t && t.id && txTypeOf(t.type) && t.date; });
    Promise.all([dbClear(ACC), dbClear(TX)]).then(function () {
      return Promise.all(accs.map(function (a) { return dbPut(ACC, a); }).concat(txs.map(function (t) { return dbPut(TX, t); })));
    }).then(function () {
      state.accounts = accs; state.txs = txs;
      ensureOrder(); sortAccounts();
      var st = parsed.settings || {};
      if (typeof st.startDay === "number" && st.startDay >= 1 && st.startDay <= 28) { state.startDay = st.startDay; dbSetMeta("startDay", st.startDay); }
      if (typeof st.budget === "number" && st.budget >= 0) { state.budget = st.budget; dbSetMeta("budget", st.budget); }
      state.cursor = periodStart(new Date(), state.startDay);
      done(accs.length, txs.length);
    });
  }

    brow2.appendChild(bsave);
    bpad2.appendChild(brow2);
    bpad2.appendChild(el('<p class="note" style="padding:8px 0 0">記録した「変動費（固定費チェックなしの支出）」を、月の区切りごとにこの予算から差し引いてホームのバーに表示します。固定費や記録していない生活費は差し引きません。0にすると予算バーをオフにして残高表示に戻します。</p>'));
    bcard2.appendChild(bpad2);
    settingsEl.appendChild(bcard2);
    if (msg && msg.where === "budget") settingsEl.appendChild(el('<p class="okmsg">' + esc(msg.text) + '</p>'));

    // 月の区切り
    settingsEl.appendChild(el('<p class="seclbl">月の区切り</p>'));
    var pcard = el('<div class="card"></div>');
    var ppad = el('<div style="padding:14px 16px"></div>');
    var prow = el('<div style="display:flex;align-items:center;gap:8px"></div>');
    prow.appendChild(el('<span style="font-size:13px;color:rgba(0,0,0,0.55)">毎月</span>'));
    var sel = el('<select class="daysel"></select>');
    for (var d2 = 1; d2 <= 28; d2++) { var o3 = el('<option value="' + d2 + '">' + d2 + '</option>'); if (d2 === state.startDay) o3.setAttribute("selected", ""); sel.appendChild(o3); }
    prow.appendChild(sel);
    prow.appendChild(el('<span style="font-size:13px;color:rgba(0,0,0,0.55)">日から</span>'));
    ppad.appendChild(prow);
    var preview = el('<p class="note" style="padding:8px 0 0"></p>');
    function updatePreview() {
      var st = periodStart(new Date(), state.startDay), en = periodEnd(st, state.startDay), last = new Date(en.getTime() - 86400000);
      preview.textContent = state.startDay === 1
        ? "暦どおり、1日から月末までを「その月」として集計します。"
        : "例：今は " + (st.getMonth() + 1) + "/" + st.getDate() + "〜" + (last.getMonth() + 1) + "/" + last.getDate() + " を「" + (st.getMonth() + 1) + "月」として集計します。";
    }
    updatePreview();
    sel.onchange = function () {
      var v = parseInt(sel.value, 10) || 1;
      state.startDay = v; dbSetMeta("startDay", v);
      state.cursor = periodStart(new Date(), v);
      state.statsCursor = periodStart(new Date(), v);
      updatePreview();
    };
    ppad.appendChild(preview);
    pcard.appendChild(ppad);
    settingsEl.appendChild(pcard);

    // バックアップ
    settingsEl.appendChild(el('<p class="seclbl">バックアップ</p>'));
    var bcard = el('<div class="card"></div>');
    var brow = el('<div class="btnrow"></div>');
    var expBtn = el('<button class="sbtn">ファイルとして保存</button>');
    expBtn.onclick = exportData;
    var impLabel = el('<label class="sbtn" style="cursor:pointer">ファイルから復元</label>');
    var impInput = el('<input type="file" accept=".json,application/json" style="display:none" />');
    impInput.onchange = function (ev) {
      var f = ev.target.files[0]; if (!f) return;
      var r = new FileReader();
      r.onload = function (e2) {
        try { var parsed = JSON.parse(e2.target.result); importData(parsed, function (na, nt) { renderSettings({ where: "backup", text: "口座" + na + "件・記録" + nt + "件を復元しました" }); }); }
        catch (err) { alert("読み込みに失敗しました"); }
      };
      r.readAsText(f); ev.target.value = "";
    };
    impLabel.appendChild(impInput);
    brow.appendChild(expBtn); brow.appendChild(impLabel);
    bcard.appendChild(brow);
    bcard.appendChild(el('<p class="note">口座・記録・設定はこの端末のブラウザ（IndexedDB）に自動保存されます。機種変更や削除に備えて、ときどきファイルとして保存しておくと安心です。</p>'));
    settingsEl.appendChild(bcard);

    if (msg && msg.where === "backup") settingsEl.appendChild(el('<p class="okmsg">' + esc(msg.text) + '</p>'));

    // データ管理
    settingsEl.appendChild(el('<p class="seclbl">データ管理</p>'));
    var dcard = el('<div class="card"></div>');
    var dpad = el('<div style="padding:14px 16px"></div>');
    var confirming = false;
    function paint() {
      dpad.innerHTML = "";
      if (!confirming) {
        var b = el('<button class="sbtn" style="width:100%">すべてのデータを削除</button>');
        b.onclick = function () { confirming = true; paint(); };
        dpad.appendChild(b);
      } else {
        dpad.appendChild(el('<p class="confirmtext">すべての口座と記録を削除します。この操作は取り消せません。</p>'));
        var row = el('<div style="display:flex;gap:8px"></div>');
        var cancel = el('<button class="sbtn" style="flex:1">キャンセル</button>');
        var del = el('<button class="sbtn danger" style="flex:1">削除する</button>');
        cancel.onclick = function () { confirming = false; paint(); };
        del.onclick = function () {
          Promise.all([dbClear(ACC), dbClear(TX)]).then(function () {
            state.accounts = []; state.txs = []; confirming = false; paint(); renderSettings();
          });
        };
        row.appendChild(cancel); row.appendChild(del); dpad.appendChild(row);
      }
    }
    paint();
    dcard.appendChild(dpad);
    settingsEl.appendChild(dcard);

    // アプリの更新について＋バージョン
    settingsEl.appendChild(el('<p class="seclbl">アプリの更新について</p>'));
    var ucard = el('<div class="card"></div>');
    ucard.appendChild(el('<p class="note" style="padding:12px 16px">新しいバージョンが公開されると、アプリを開いたときに自動で更新されます。反映されないときは、アプリを一度完全に閉じて開き直してください。データはそのまま引き継がれます。</p>'));
    settingsEl.appendChild(ucard);
    settingsEl.appendChild(el('<p style="text-align:center;margin:18px 0 8px;font-size:11px;color:rgba(0,0,0,0.25)">バージョン ' + APP_VERSION + '</p>'));
  }

  /* ---------- init ---------- */
  buildShell();
  renderView();
  Promise.all([dbAll(ACC), dbAll(TX), dbGetMeta("startDay"), dbGetMeta("budget")]).then(function (res) {
    state.accounts = res[0];
    state.txs = res[1];
    if (typeof res[2] === "number" && res[2] >= 1 && res[2] <= 28) state.startDay = res[2];
    if (typeof res[3] === "number" && res[3] >= 0) state.budget = res[3];
    ensureOrder(); sortAccounts();
    state.cursor = periodStart(new Date(), state.startDay);
    renderView();
  }).catch(function (err) {
    homeEl.innerHTML = '<div class="empty">保存領域を開けませんでした<br>' + esc(String(err)) + '</div>';
  });
})();
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("./sw.js").then(function (reg) {
      reg.update().catch(function () {});
      reg.addEventListener("updatefound", function () {
        var nw = reg.installing;
        if (!nw) return;
        nw.addEventListener("statechange", function () {
          if (nw.state === "installed" && navigator.serviceWorker.controller) {
            nw.postMessage("skipWaiting");
          }
        });
      });
    }).catch(function () {});
    var refreshing = false;
    navigator.serviceWorker.addEventListener("controllerchange", function () {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });
    document.addEventListener("visibilitychange", function () {
      if (document.visibilityState === "visible") {
        navigator.serviceWorker.getRegistration().then(function (r) { if (r) r.update(); }).catch(function () {});
      }
    });
  });
}
</script>
</body>
</html>
