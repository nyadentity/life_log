// ── 過去の体重・月経期間の記入（設定 > 身体）──────────────
function BodyBackfill({bodyR,onBodyUpdate}) {
  const today=todayKey();
  const wDateRef=useRef(null),wValRef=useRef(null);
  const pFromRef=useRef(null),pToRef=useRef(null);
  const[msg,setMsg]=useState("");
  const flash=t=>{setMsg(t);setTimeout(()=>setMsg(""),3000);};
  const fmt=ds=>{const[,mm,dd]=ds.split("-");return`${+mm}/${+dd}`;};
  const dateInp={border:"none",background:"rgba(0,0,0,0.04)",borderRadius:10,padding:"6px 8px",fontSize:12,color:"rgba(0,0,0,0.6)",outline:"none",fontFamily:"inherit"};
  const addWeight=()=>{
    const d=wDateRef.current?.value;
    const v=parseFloat(wValRef.current?.value);
    if(!d||d>today||isNaN(v)||v<=0){flash("日付と体重を確認してください");return;}
    const nx=JSON.parse(JSON.stringify(bodyR));
    nx[d]={...(nx[d]||{}),weight:Math.round(v*10)/10};
    onBodyUpdate(nx);
    if(wValRef.current)wValRef.current.value="";
    flash(`${fmt(d)} の体重を記録しました`);
  };
  const addPeriod=()=>{
    const s=pFromRef.current?.value,e=pToRef.current?.value;
    if(!s||!e||s>e||s>today){flash("開始日と終了日を確認してください");return;}
    if(diffD(s,e)>60){flash("期間が長すぎます（60日以内）");return;}
    const nx=JSON.parse(JSON.stringify(bodyR));
    let cur=s;
    while(cur<=e){nx[cur]={...(nx[cur]||{}),period:true};cur=addD(cur,1);}
    onBodyUpdate(nx);
    flash(`${fmt(s)}〜${fmt(e)} の月経を記録しました`);
  };
  return(
    <div style={{...card,marginTop:6}}><div style={{padding:"12px 16px"}}>
      <p style={{fontSize:10,color:"rgba(0,0,0,0.38)",fontWeight:600,marginBottom:6}}>過去の体重を記入</p>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:12,flexWrap:"wrap"}}>
        <input ref={wDateRef} type="date" max={today} style={dateInp}/>
        <input ref={wValRef} type="number" inputMode="decimal" step="0.1" min="0" placeholder="--.-"
          style={{...dateInp,width:54,textAlign:"right"}}/>
        <span style={{fontSize:12,color:"rgba(0,0,0,0.45)"}}>kg</span>
        <button onClick={addWeight} style={smBtn("#dddddd")}>追加</button>
      </div>
      <p style={{fontSize:10,color:"rgba(0,0,0,0.38)",fontWeight:600,marginBottom:6}}>過去の月経期間を記録</p>
      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
        <input ref={pFromRef} type="date" max={today} style={dateInp}/>
        <span style={{fontSize:11,color:"rgba(0,0,0,0.4)"}}>〜</span>
        <input ref={pToRef} type="date" max={today} style={dateInp}/>
        <button onClick={addPeriod} style={smBtn("#dddddd")}>追加</button>
      </div>
      {msg&&<p style={{fontSize:11,color:"rgba(0,0,0,0.45)",marginTop:10}}>{msg}</p>}
      <p style={{fontSize:10,color:"rgba(0,0,0,0.3)",marginTop:10,lineHeight:1.6}}>記録した日は身体タブで日付を移動して確認・修正できます。</p>
    </div></div>
  );
}
function SettingsTab({tabOrder,onTabOrderChange,hiddenTabs,onToggleHidden,medConfig,onMedConfigChange,tagConf,onTagConfChange,bodyC,onBodyConfChange,bodyR,onBodyUpdate,allData,onImport,onDeleteAll,onBackedUp}) {
  const[confirmDel,setConfirmDel]=useState(false);
  const[tabEditId,setTabEditId]=useState(null);
  const mvTab=(i,dir)=>{const a=[...tabOrder],j=i+dir;if(j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];onTabOrderChange(a);};
  const exp=()=>{const json=JSON.stringify({...allData,exportedAt:new Date().toISOString()},null,2);const fn=`lifelog-backup-${todayKey()}.json`;onBackedUp&&onBackedUp();if(navigator.share){const f=new File([json],fn,{type:"application/json"});navigator.share({files:[f]}).catch(()=>{});return;}const a=document.createElement("a");a.href="data:application/json;charset=utf-8,"+encodeURIComponent(json);a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);};
  return(
    <div style={{width:"100%",maxWidth:380}}>
      <p style={secLbl}>タブの表示</p>
      {tabOrder.map((t,i)=>{const hidden=hiddenTabs.includes(t);const ed=tabEditId===t;return(
        <div key={t} style={{...card,marginBottom:6,opacity:hidden?0.5:1}}>
          {ed?(
            <div style={{padding:"12px 16px"}}>
              <p style={{fontSize:13,fontWeight:600,color:"rgba(0,0,0,0.6)",marginBottom:12}}>{TAB_LABELS[t]}</p>
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                <button onClick={()=>mvTab(i,-1)} disabled={i===0} style={{...smBtn(),flex:1,padding:"8px 0",fontSize:11,opacity:i===0?0.4:1}}>上へ</button>
                <button onClick={()=>mvTab(i,1)} disabled={i===tabOrder.length-1} style={{...smBtn(),flex:1,padding:"8px 0",fontSize:11,opacity:i===tabOrder.length-1?0.4:1}}>下へ</button>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>onToggleHidden(t)} style={{...smBtn("rgba(0,0,0,0.06)"),flex:1,padding:"9px 0",fontSize:11,color:hidden?"rgba(0,0,0,0.35)":"rgba(0,0,0,0.45)"}}>{hidden?"表示する":"非表示"}</button>
                <button onClick={()=>setTabEditId(null)} style={{...smBtn("rgba(0,0,0,0.09)"),flex:1,padding:"9px 0",fontSize:11,fontWeight:700}}>完了</button>
              </div>
            </div>
          ):(
            <div style={{padding:"10px 16px",display:"flex",alignItems:"center",gap:8}}>
              <span style={{flex:1,fontSize:13,fontWeight:600,color:"rgba(0,0,0,0.6)"}}>{TAB_LABELS[t]}{hidden&&<span style={{fontSize:10,color:"rgba(0,0,0,0.3)",marginLeft:6}}>非表示</span>}</span>
              <button onClick={()=>setTabEditId(t)} style={{...smBtn(),fontSize:11,padding:"3px 8px"}}>編集</button>
            </div>
          )}
        </div>
      );})}
      <p style={{...secLbl,marginTop:12}}>出来事タグ</p>
      <TagSettingsSection conf={tagConf} onConfChange={onTagConfChange}/>
            <p style={{...secLbl,marginTop:12}}>身体</p>
      <div style={card}><div style={{padding:"12px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{flex:1,fontSize:13,color:"rgba(0,0,0,0.6)"}}>身長（BMI計算用）</span>
          <input type="number" inputMode="decimal" step="0.1" min="0" defaultValue={bodyC?.height??""}
            placeholder="---"
            onBlur={e=>{const v=parseFloat(e.target.value);onBodyConfChange({...(bodyC||{}),height:isNaN(v)||v<=0?null:Math.round(v*10)/10});}}
            style={{width:70,border:"none",background:"rgba(0,0,0,0.04)",borderRadius:10,padding:"6px 8px",fontSize:13,fontWeight:600,color:"rgba(0,0,0,0.6)",outline:"none",fontFamily:"inherit",textAlign:"right"}}/>
          <span style={{fontSize:12,color:"rgba(0,0,0,0.45)"}}>cm</span>
        </div>
      </div></div>
      <BodyBackfill bodyR={bodyR} onBodyUpdate={onBodyUpdate}/>
      <p style={{...secLbl,marginTop:12}}>服薬設定</p>
      <MedSettingsSection config={medConfig} onConfigChange={onMedConfigChange}/>
      <p style={{...secLbl,marginTop:12}}>頓服プリセット</p>
      <PrnSettingsSection config={medConfig} onConfigChange={onMedConfigChange}/>
      <p style={{...secLbl,marginTop:12}}>バックアップ</p>
      <div style={card}>
        <div style={{padding:"12px 16px",display:"flex",gap:8}}>
          <button onClick={exp} style={{...smBtn(),flex:1,padding:"9px 0",fontSize:12}}>ファイルとして保存</button>
          <label style={{...smBtn(),flex:1,padding:"9px 0",fontSize:12,textAlign:"center",cursor:"pointer",display:"block"}}>ファイルから復元<input type="file" accept=".json" onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{onImport(JSON.parse(ev.target.result));}catch{alert("読み込みに失敗しました");}};r.readAsText(f);e.target.value="";}} style={{display:"none"}}/></label>
        </div>
        <p style={{fontSize:10,color:"rgba(0,0,0,0.28)",padding:"0 16px 12px",lineHeight:1.5}}>データはこの端末のブラウザ（IndexedDB）に自動保存されます。</p>
      </div>
      <p style={{...secLbl,marginTop:12}}>データ管理</p>
      <div style={card}><div style={{padding:"14px 16px"}}>
        {confirmDel?<><p style={{fontSize:12,color:"rgba(0,0,0,0.55)",marginBottom:12}}>すべての記録・設定を削除します。この操作は取り消せません。</p><div style={{display:"flex",gap:8}}><button onClick={()=>setConfirmDel(false)} style={{...smBtn(),flex:1,padding:"9px 0",fontSize:12}}>キャンセル</button><button onClick={()=>{onDeleteAll();setConfirmDel(false);}} style={{...smBtn("rgba(220,80,80,0.12)"),flex:1,padding:"9px 0",fontSize:12,color:"rgba(180,50,50,0.8)",fontWeight:700}}>削除する</button></div></>:<button onClick={()=>setConfirmDel(true)} style={{...smBtn("rgba(0,0,0,0.05)"),width:"100%",padding:"9px 0",fontSize:12,color:"rgba(0,0,0,0.38)"}}>すべてのデータを削除</button>}
      </div></div>
      <p style={{textAlign:"center",fontSize:10,color:"rgba(0,0,0,0.28)",marginTop:16}}>バージョン {APP_VERSION}</p>
    </div>
  );
}

// ── App ──────────────────────────────────────────────────
function App() {
  const[bathR,    setBathR]    =useState({});
  const[medR,     setMedR]     =useState({});
  const[medC,     setMedC]     =useState(defaultMedConf);
  const[mealR,    setMealR]    =useState({});
  const[teethR,   setTeethR]   =useState({});
  const[skinR,    setSkinR]    =useState({});
  const[careR,    setCareR]    =useState({});
  const[bodyR,    setBodyR]    =useState({});
  const[bodyC,    setBodyC]    =useState({});
  const[teethConf,setTeethConf]=useState(defaultTeethConf);
  const[memoR,    setMemoR]    =useState({});
  const[moodR,    setMoodR]    =useState({});
  const[tagConf,  setTagConf]  =useState(defaultTagConf);
  const[tabOrder, setTabOrder] =useState(DEFAULT_TAB_ORDER);
  const[hiddenTabs,setHiddenTabs]=useState([]);
  // 初期タブは左端（DEFAULT_TAB_ORDER[0]）
  const[tab,      setTab]      =useState(DEFAULT_TAB_ORDER[0]);
  const[loaded,   setLoaded]   =useState(false);
  const[backupDue,setBackupDue]=useState(false);
  const[periodDismiss,setPeriodDismiss]=useState(null);
  const dateNav=useDateNav(todayKey()); // 全記録タブで共有する日付ナビ

  useEffect(()=>{
    (async()=>{
      await migrateMed();
      const[br,mr,mc,mlr,tr,tc,skr,cr,bdr,bdc,mmr,mdr,tgc,as_]=await Promise.all([
        dbGet(K.bath),dbGet(K.med),dbGet(K.medC),
        dbGet(K.meal),dbGet(K.teeth),dbGet(K.teethC),dbGet(K.skin),dbGet(K.care),dbGet(K.body),dbGet(K.bodyC),dbGet(K.memo),
        dbGet(K.mood),dbGet(K.tagC),dbGet(K.set),
      ]);
      let conf=mc||defaultMedConf();const def=defaultMedConf();
      conf={...def,...conf,slots:{...def.slots,...conf.slots}};
      for(const sid of Object.keys(conf.slots))conf.slots[sid].meds=(conf.slots[sid].meds||[]).map(normMed);
      setBathR(br||{});setMedR(mr||{});setMedC(conf);setMealR(mlr||{});setTeethR(tr||{});setSkinR(skr||{});setCareR(cr||{});setBodyR(bdr||{});setBodyC(bdc||{});setMemoR(mmr||{});setMoodR(mdr||{});
      if(tc)setTeethConf(tc);
      if(tgc)setTagConf(tgc);
      // 旧タブ名の移行: bath/teeth→care, memo→mood
      const migTab=t=>t==="bath"||t==="teeth"?"care":(t==="memo"?"mood":t);
      if(as_?.tabOrder){
        const p=[...new Set(as_.tabOrder.map(migTab))].filter(t=>DEFAULT_TAB_ORDER.includes(t));
        const missing=DEFAULT_TAB_ORDER.filter(t=>!p.includes(t));
        const merged=[...p,...missing];if(merged.length)setTabOrder(merged);
      }
      if(as_?.hiddenTabs)setHiddenTabs([...new Set(as_.hiddenTabs.map(migTab))].filter(t=>DEFAULT_TAB_ORDER.includes(t)));
      if(as_?.lastTab&&!SECONDARY_TABS.includes(as_.lastTab)){const lt=migTab(as_.lastTab);if(DEFAULT_TAB_ORDER.includes(lt))setTab(lt);}
      // バックアップ催促：最後のバックアップから7日以上経過、または一度もしていない
      const hasData=Object.keys(br||{}).length||Object.keys(mr||{}).length||Object.keys(mlr||{}).length||Object.keys(tr||{}).length||Object.keys(mmr||{}).length||Object.keys(mdr||{}).length;
      const lb=as_?.lastBackup;
      if(hasData&&(!lb||(Date.now()-lb)>604800000))setBackupDue(true);
      if(as_?.periodDismiss)setPeriodDismiss(as_.periodDismiss);
      setLoaded(true);
    })().catch(e=>{console.error('load error:',e);setLoaded(true);});
  },[]);

  const saveBath  =useCallback(async nx=>{setBathR(nx);await dbSet(K.bath,nx);},[]);
  const saveMed   =useCallback(async nx=>{setMedR(nx);await dbSet(K.med,nx);},[]);
  const saveMedC  =useCallback(async nx=>{setMedC(nx);await dbSet(K.medC,nx);},[]);
  const saveMeal  =useCallback(async nx=>{setMealR(nx);await dbSet(K.meal,nx);},[]);
  const saveTeeth =useCallback(async nx=>{setTeethR(nx);await dbSet(K.teeth,nx);},[]);
  const saveTeethC=useCallback(async nx=>{setTeethConf(nx);await dbSet(K.teethC,nx);},[]);
  const saveSkin  =useCallback(async nx=>{setSkinR(nx);await dbSet(K.skin,nx);},[]);
  const saveCare  =useCallback(async nx=>{setCareR(nx);await dbSet(K.care,nx);},[]);
  const saveBody  =useCallback(async nx=>{setBodyR(nx);await dbSet(K.body,nx);},[]);
  const saveBodyC =useCallback(async nx=>{setBodyC(nx);await dbSet(K.bodyC,nx);},[]);
  const saveMemo  =useCallback(async nx=>{setMemoR(nx);await dbSet(K.memo,nx);},[]);
  const saveMood  =useCallback(async nx=>{setMoodR(nx);await dbSet(K.mood,nx);},[]);
  const saveTagC  =useCallback(async nx=>{setTagConf(nx);await dbSet(K.tagC,nx);},[]);
  const saveSets  =useCallback(async patch=>{const cur=await dbGet(K.set)||{};await dbSet(K.set,{...cur,...patch});},[]);

  const markBackedUp  =useCallback(()=>{setBackupDue(false);saveSets({lastBackup:Date.now()});},[saveSets]);
  // 月経予測の通知判定：予測日の3日前〜当日、その日の記録がまだ無い、閉じていない
  const periodNotice=(()=>{
    const st=periodStats(bodyR);
    if(!st?.next)return null;
    const t=todayKey();
    const du=diffD(t,st.next);
    if(du<0||du>3)return null;
    if(bodyR[t]?.period)return null;
    if(periodDismiss===st.next)return null;
    return{next:st.next,du};
  })();
  const dismissPeriod=useCallback(()=>{const st=periodStats(bodyR);if(st?.next){setPeriodDismiss(st.next);saveSets({periodDismiss:st.next});}},[bodyR,saveSets]);
  const changeTab     =useCallback(t=>{setTab(t);if(!SECONDARY_TABS.includes(t))saveSets({lastTab:t});},[saveSets]);
  const toggleHidden  =useCallback(async tabId=>{const next=hiddenTabs.includes(tabId)?hiddenTabs.filter(t=>t!==tabId):[...hiddenTabs,tabId];setHiddenTabs(next);await saveSets({hiddenTabs:next});},[hiddenTabs,saveSets]);
  const changeTabOrder=useCallback(async o=>{setTabOrder(o);await saveSets({tabOrder:o});},[saveSets]);

  const medTake=useCallback((dk,sid)=>{
    // 服用時刻を保存しつつ、その時点の薬名を __names[sid] に焼き込む
    const nx=JSON.parse(JSON.stringify(medR));
    if(!nx[dk])nx[dk]={};
    nx[dk][sid]=new Date().toISOString();
    let names=[];
    if(sid.startsWith("w:")){const wm=(medC.weeklyMeds||[]).find(w=>`w:${w.id}`===sid);if(wm)names=[wm.name];}
    else{names=((medC.slots[sid]||{}).meds||[]).map(m=>m.name||m);}
    if(names.length){if(!nx[dk].__names)nx[dk].__names={};nx[dk].__names[sid]=names;}
    saveMed(nx);
  },[medR,medC,saveMed]);
  const medUpd=useCallback((dk,sid,val)=>{const nx=JSON.parse(JSON.stringify(medR));if(!nx[dk])nx[dk]={};if(sid==="prn"){if(val)nx[dk][sid]=val;else delete nx[dk][sid];}else nx[dk][sid]=hmIso(dk,val);if(!Object.keys(nx[dk]).length)delete nx[dk];saveMed(nx);},[medR,saveMed]);
  const medRem=useCallback((dk,sid)=>{const nx=JSON.parse(JSON.stringify(medR));if(nx[dk]){delete nx[dk][sid];if(nx[dk].__names)delete nx[dk].__names[sid];if(nx[dk].__names&&!Object.keys(nx[dk].__names).length)delete nx[dk].__names;}if(!Object.keys(nx[dk]||{}).length)delete nx[dk];saveMed(nx);},[medR,saveMed]);
  const prnAdd=useCallback((dk,preset)=>{const nx=JSON.parse(JSON.stringify(medR));if(!nx[dk])nx[dk]={};const list=Array.isArray(nx[dk].prnList)?nx[dk].prnList:[];list.push({id:uid(),name:preset.name,color:preset.color||"#d0d0d0",time:new Date().toISOString()});nx[dk].prnList=list;saveMed(nx);},[medR,saveMed]);
  const prnTime=useCallback((dk,id,hm)=>{const nx=JSON.parse(JSON.stringify(medR));const list=(nx[dk]?.prnList||[]).map(e=>e.id===id?{...e,time:hmIso(dk,hm)}:e);nx[dk].prnList=list;saveMed(nx);},[medR,saveMed]);
  const prnRemove=useCallback((dk,id)=>{const nx=JSON.parse(JSON.stringify(medR));const list=(nx[dk]?.prnList||[]).filter(e=>e.id!==id);if(list.length)nx[dk].prnList=list;else delete nx[dk].prnList;if(!Object.keys(nx[dk]||{}).length)delete nx[dk];saveMed(nx);},[medR,saveMed]);

  const handleImport=useCallback(async data=>{
    if(data.bath_r!==undefined){setBathR(data.bath_r||{});await dbSet(K.bath,data.bath_r||{});}
    if(data.meal_r!==undefined){setMealR(data.meal_r||{});await dbSet(K.meal,data.meal_r||{});}
    if(data.teeth_r!==undefined){setTeethR(data.teeth_r||{});await dbSet(K.teeth,data.teeth_r||{});}
    if(data.teeth_c!==undefined){setTeethConf(data.teeth_c||defaultTeethConf());await dbSet(K.teethC,data.teeth_c||defaultTeethConf());}
    if(data.skin_r!==undefined){setSkinR(data.skin_r||{});await dbSet(K.skin,data.skin_r||{});}
    if(data.care_r!==undefined){setCareR(data.care_r||{});await dbSet(K.care,data.care_r||{});}
    if(data.body_r!==undefined){setBodyR(data.body_r||{});await dbSet(K.body,data.body_r||{});}
    if(data.body_c!==undefined){setBodyC(data.body_c||{});await dbSet(K.bodyC,data.body_c||{});}
    if(data.memo_r!==undefined){setMemoR(data.memo_r||{});await dbSet(K.memo,data.memo_r||{});}
    if(data.mood_r!==undefined){setMoodR(data.mood_r||{});await dbSet(K.mood,data.mood_r||{});}
    if(data.tag_c!==undefined){setTagConf(data.tag_c||defaultTagConf());await dbSet(K.tagC,data.tag_c||defaultTagConf());}
    if(data.med_r!==undefined){setMedR(data.med_r||{});await dbSet(K.med,data.med_r||{});}
    if(data.med_c!==undefined){let c=data.med_c||defaultMedConf();const df=defaultMedConf();c={...df,...c,slots:{...df.slots,...c.slots}};for(const sid of Object.keys(c.slots))c.slots[sid].meds=(c.slots[sid].meds||[]).map(normMed);setMedC(c);await dbSet(K.medC,c);}
    // 復元直後はバックアップ催促を出さない（最終バックアップ日時を今に更新）
    setBackupDue(false);await saveSets({lastBackup:Date.now()});
  },[saveSets]);
  const handleDeleteAll=useCallback(async()=>{const emp=defaultMedConf();setBathR({});setMedR({});setMedC(emp);setMealR({});setTeethR({});setSkinR({});setCareR({});setBodyR({});setBodyC({});setMemoR({});setMoodR({});await Promise.all([dbSet(K.bath,{}),dbSet(K.med,{}),dbSet(K.medC,emp),dbSet(K.meal,{}),dbSet(K.teeth,{}),dbSet(K.skin,{}),dbSet(K.care,{}),dbSet(K.body,{}),dbSet(K.bodyC,{}),dbSet(K.memo,{}),dbSet(K.mood,{})]);},[]); 

  if(!loaded)return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:12,color:"rgba(0,0,0,0.3)"}}>読み込み中…</span></div>;

  const mainTabs=tabOrder.filter(t=>!hiddenTabs.includes(t));
  const isSecondary=SECONDARY_TABS.includes(tab);
  const activeTab=([...mainTabs,...SECONDARY_TABS]).includes(tab)?tab:(mainTabs[0]||"settings");
  const allData={bath_r:bathR,med_r:medR,med_c:medC,meal_r:mealR,teeth_r:teethR,teeth_c:teethConf,skin_r:skinR,care_r:careR,body_r:bodyR,body_c:bodyC,memo_r:memoR,mood_r:moodR,tag_c:tagConf};

  // タイトルタップ：セカンダリタブからメインタブへ
  const handleTitleTap=()=>{if(isSecondary){const t=mainTabs.find(t=>t===tab)||mainTabs[0]||DEFAULT_TAB_ORDER[0];changeTab(t);}};

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",paddingTop:"max(env(safe-area-inset-top),24px)",paddingLeft:16,paddingRight:16,paddingBottom:56}}>
      {/* ヘッダー */}
      <div style={{width:"100%",maxWidth:380,marginBottom:14,display:"flex",alignItems:"flex-start",gap:8}}>
        <div style={{flex:1,minWidth:0}}>
          <h1 onClick={handleTitleTap}
            style={{fontSize:17,fontWeight:700,letterSpacing:".05em",color:"rgba(0,0,0,0.65)",margin:"0 0 2px",cursor:isSecondary?"pointer":"default",userSelect:"none"}}>
            ライフログ
          </h1>
          <p style={{fontSize:11,color:"rgba(0,0,0,0.33)"}}>{new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric",weekday:"long"})}</p>
        </div>
        {/* 右上：ホーム / 履歴 / 統計 / 設定 */}
        <div style={{display:"flex",gap:4,paddingTop:3,flexShrink:0}}>
          <button onClick={()=>changeTab(mainTabs[0]||DEFAULT_TAB_ORDER[0])} style={secTabS(!isSecondary)}>ホーム</button>
          {SECONDARY_TABS.map(t=>(
            <button key={t} onClick={()=>changeTab(t)} style={secTabS(activeTab===t)}>{TAB_LABELS[t]}</button>
          ))}
        </div>
      </div>
      {/* メインタブバー（セカンダリ表示中は非表示） */}
      {!isSecondary&&(
        <div className="scrolltab" style={{width:"100%",maxWidth:380,marginBottom:14}}>
          {mainTabs.map(t=><button key={t} onClick={()=>changeTab(t)} style={tabBtnS(activeTab===t)}>{TAB_LABELS[t]}</button>)}
        </div>
      )}
      {isSecondary&&<div style={{marginBottom:14}}/>}
      {activeTab==="med"      &&<MedTab      records={medR}   config={medC} onTake={medTake} onUpdate={medUpd} onRemove={medRem} onPrnAdd={prnAdd} onPrnTime={prnTime} onPrnRemove={prnRemove} dateNav={dateNav}/>}
      {activeTab==="meal"     &&<MealTab     records={mealR}  onUpdate={saveMeal} dateNav={dateNav}/>}
      {activeTab==="care"     &&<CareTab     careR={careR} onCare={saveCare} dateNav={dateNav}/>}
      {activeTab==="body"     &&<BodyTab     records={bodyR} conf={bodyC} onUpdate={saveBody} dateNav={dateNav}/>}
      {activeTab==="mood"     &&<MoodTab     records={moodR}  tagConf={tagConf} onUpdate={saveMood} memoR={memoR} onMemoUpdate={saveMemo} dateNav={dateNav}/>}
      {activeTab==="timeline" &&<TimelineTab bathR={bathR} medR={medR} medConf={medC} mealR={mealR} teethR={teethR} skinR={skinR} careR={careR} bodyR={bodyR} bodyC={bodyC} memoR={memoR} moodR={moodR} tagConf={tagConf} teethConf={teethConf}/>}
      {activeTab==="stats"    &&<StatsTab    bathR={bathR} medR={medR} medConf={medC} mealR={mealR} teethR={teethR} skinR={skinR} careR={careR} bodyR={bodyR} moodR={moodR}/>}
      {activeTab==="settings" &&<SettingsTab tabOrder={tabOrder} onTabOrderChange={changeTabOrder} hiddenTabs={hiddenTabs} onToggleHidden={toggleHidden} medConfig={medC} onMedConfigChange={saveMedC} tagConf={tagConf} onTagConfChange={saveTagC} bodyC={bodyC} onBodyConfChange={saveBodyC} bodyR={bodyR} onBodyUpdate={saveBody} allData={allData} onImport={handleImport} onDeleteAll={handleDeleteAll} onBackedUp={markBackedUp}/>}
      {periodNotice&&(
        <div style={{position:"fixed",left:0,right:0,bottom:backupDue?"auto":0,top:backupDue?0:"auto",zIndex:9998,display:"flex",alignItems:"center",gap:10,
          padding:backupDue?"calc(13px + env(safe-area-inset-top)) 16px 13px":"13px 16px calc(13px + env(safe-area-inset-bottom))",background:"rgba(255,255,255,0.97)",
          borderTop:backupDue?"none":"1px solid rgba(0,0,0,0.08)",borderBottom:backupDue?"1px solid rgba(0,0,0,0.08)":"none",
          boxShadow:backupDue?"0 2px 12px rgba(0,0,0,0.06)":"0 -2px 12px rgba(0,0,0,0.06)"}}>
          <div style={{width:3,height:16,borderRadius:2,background:CAT.period.color,flexShrink:0}}/>
          <span style={{flex:1,fontSize:12,color:"rgba(0,0,0,0.6)"}}>
            {periodNotice.du===0?"月経予測日です":`月経予測日まであと${periodNotice.du}日`}（{(()=>{const[,mm,dd]=periodNotice.next.split("-");return`${+mm}月${+dd}日`;})()}）
          </span>
          <button onClick={dismissPeriod}
            style={{background:"none",border:"none",color:"rgba(0,0,0,0.3)",fontSize:14,cursor:"pointer",padding:"4px",fontFamily:"inherit"}}>✕</button>
        </div>
      )}
      {backupDue&&(
        <div style={{position:"fixed",left:0,right:0,bottom:0,zIndex:9998,display:"flex",alignItems:"center",gap:10,
          padding:"13px 16px calc(13px + env(safe-area-inset-bottom))",background:"rgba(255,255,255,0.97)",
          borderTop:"1px solid rgba(0,0,0,0.08)",boxShadow:"0 -2px 12px rgba(0,0,0,0.06)"}}>
          <span style={{flex:1,fontSize:12,color:"rgba(0,0,0,0.6)"}}>そろそろバックアップしませんか？</span>
          <button onClick={()=>{changeTab("settings");setBackupDue(false);}}
            style={{background:"rgba(0,0,0,0.09)",border:"none",borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:700,color:"rgba(0,0,0,0.65)",cursor:"pointer",fontFamily:"inherit"}}>設定を開く</button>
          <button onClick={()=>setBackupDue(false)}
            style={{background:"none",border:"none",color:"rgba(0,0,0,0.3)",fontSize:14,cursor:"pointer",padding:"4px",fontFamily:"inherit"}}>✕</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

// ── Service Worker 登録 + 完全自動更新 ──
if("serviceWorker" in navigator){
  let refreshing=false;
  // 新しいSWが制御を開始したら自動で1回リロード（＝即最新版に）
  navigator.serviceWorker.addEventListener("controllerchange",()=>{
    if(refreshing)return;refreshing=true;location.reload();
  });
  navigator.serviceWorker.register("./sw.js").then(reg=>{
    // 起動のたびに更新を確認
    reg.update().catch(()=>{});
    // 待機中の新SWがいれば即有効化（skipWaiting→controllerchange→reload）
    if(reg.waiting) reg.waiting.postMessage("SKIP_WAITING");
    reg.addEventListener("updatefound",()=>{
      const nw=reg.installing;
      if(!nw)return;
      nw.addEventListener("statechange",()=>{
        if(nw.state==="installed" && navigator.serviceWorker.controller){
          // 新版インストール完了 → 即有効化
          nw.postMessage("SKIP_WAITING");
        }
      });
    });
  }).catch(()=>{});
  // アプリが再び前面に来たときも更新チェック（バックグラウンド復帰時）
  document.addEventListener("visibilitychange",()=>{
    if(document.visibilityState==="visible"){
      navigator.serviceWorker.getRegistration().then(r=>r&&r.update().catch(()=>{}));
    }
  });
}
</script>
</body>
