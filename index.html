// ── IndexedDB ──────────────────────────────────────────────
let _db = null;
function openDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((res,rej) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("data");
    req.onsuccess = e => { _db = e.target.result; res(_db); };
    req.onerror = () => rej(req.error);
  });
}
async function dbGet(key) {
  const db = await openDB();
  return new Promise((res,rej) => {
    const req = db.transaction("data","readonly").objectStore("data").get(key);
    req.onsuccess = () => res(req.result ?? null);
    req.onerror = () => rej(req.error);
  });
}
async function dbSet(key, val) {
  const db = await openDB();
  return new Promise((res,rej) => {
    const req = db.transaction("data","readwrite").objectStore("data").put(val, key);
    req.onsuccess = () => res(); req.onerror = () => rej(req.error);
  });
}
async function migrateMed() {
  if (await dbGet("_migrated")) return;
  await new Promise(res => {
    try {
      const req = indexedDB.open("med-tracker", 1);
      req.onerror = () => res();
      req.onsuccess = async e => {
        try {
          const db2 = e.target.result;
          const tx = db2.transaction("data","readonly").objectStore("data");
          const g = k => new Promise(r => { const q=tx.get(k); q.onsuccess=()=>r(q.result||null); q.onerror=()=>r(null); });
          const [rec,conf] = await Promise.all([g("records"),g("config")]);
          db2.close();
          if (rec)  await dbSet(K.med, rec);
          if (conf) await dbSet(K.medC, conf);
        } catch {}
        res();
      };
    } catch { res(); }
  });
  await dbSet("_migrated", true);
}

// textarea を内容に合わせて自動で高さ調整
// 点列[{x,y}]を滑らかな曲線パス(d属性)に変換（Catmull-Rom→ベジェ）
function smoothPath(pts){
  if(!pts.length)return"";
  if(pts.length===1)return`M ${pts[0].x} ${pts[0].y}`;
  let d=`M ${pts[0].x} ${pts[0].y}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;
    const c1x=p1.x+(p2.x-p0.x)/6, c1y=p1.y+(p2.y-p0.y)/6;
    const c2x=p2.x-(p3.x-p1.x)/6, c2y=p2.y-(p3.y-p1.y)/6;
    d+=` C ${c1x} ${c1y}, ${c2x} ${c2y}, ${p2.x} ${p2.y}`;
  }
  return d;
}

function useDateNav(realToday) {
  const[cur,setCur]=useState(realToday);
  const prev=useCallback(()=>setCur(d=>addDays(d,-1)),[]);
  const next=useCallback(()=>setCur(d=>{const n=addDays(d,1);return n<=realToday?n:d;}),[realToday]);
  const goTo=useCallback(ds=>{if(ds&&ds<=realToday)setCur(ds);},[realToday]);
  const goToday=useCallback(()=>setCur(realToday),[realToday]);
  return{curDate:cur,prevDay:prev,nextDay:next,goTo,goToday};
}

// ── 入浴タブ ──────────────────────────────────────────────
// ── 清潔タブ（入浴・歯磨き・スキンケア）───────────────────
// 記録: careR = {date:{bath:{r:1-4,memo:""},teeth:{...},skin:{...}}}
// 旧形式（数値1-3）は読み込み時に正規化: 1=できなかった, 2→3=できた, 3→4=よくできた
// 日付ユーティリティ（YYYY-MM-DD）
function addD(ds,n){const t=new Date(ds+"T00:00:00");t.setDate(t.getDate()+n);const p=x=>String(x).padStart(2,"0");return`${t.getFullYear()}-${p(t.getMonth()+1)}-${p(t.getDate())}`;}
function diffD(a,b){return Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/86400000);}
// 月経周期の集計：開始日リスト・平均周期・平均期間・次回予測
function periodStats(bodyR){
  const set=new Set(Object.keys(bodyR||{}).filter(d=>bodyR[d]?.period));
  if(!set.size)return null;
  const days=[...set].sort();
  const starts=days.filter(d=>!set.has(addD(d,-1)));
  const lens=starts.map(s=>{let n=0,cur=s;while(set.has(cur)){n++;cur=addD(cur,1);}return n;});
  const diffs=[];
  for(let i=1;i<starts.length;i++){const dd=diffD(starts[i-1],starts[i]);if(dd>=15&&dd<=90)diffs.push(dd);}
  const avgCycle=diffs.length?Math.round(diffs.reduce((s,v)=>s+v,0)/diffs.length):null;
  const avgLen=lens.length?Math.round(lens.reduce((s,v)=>s+v,0)/lens.length*10)/10:null;
  const lastStart=starts[starts.length-1];
  const next=lastStart&&avgCycle?addD(lastStart,avgCycle):null;
  return{starts,avgCycle,avgLen,lastStart,next,cycleCount:diffs.length};
}
function normCare(v){
  if(v==null)return{};
  if(typeof v==="number")return{r:v===1?1:v+1};
  return v;
}

function CareTab({careR,onCare,dateNav}) {
  const realToday=todayKey();
  const{curDate,prevDay,nextDay,goTo,goToday}=dateNav;
  const cats=[
    {key:"bath", label:"入浴",       color:CAT.bath.color},
    {key:"teeth",label:"歯磨き",     color:CAT.teeth.color},
    {key:"skin", label:"スキンケア", color:CAT.skin.color},
  ];
  const day=careR[curDate]||{};
  const patchCat=(key,p)=>{
    const nx=JSON.parse(JSON.stringify(careR));
    const cur=normCare((nx[curDate]||{})[key]);
    const next={...cur,...p};
    if(!nx[curDate])nx[curDate]={};
    const empty=next.r==null&&!(next.memo||"").trim();
    if(empty)delete nx[curDate][key];else nx[curDate][key]=next;
    if(!Object.keys(nx[curDate]).length)delete nx[curDate];
    onCare(nx);
  };
  return(
    <div style={{width:"100%",maxWidth:380}}>
      <DateNav curDate={curDate} realToday={realToday} onPrev={prevDay} onNext={nextDay} onGoTo={goTo} onToday={goToday}/>
      {cats.map(cat=>{
        const rec=normCare(day[cat.key]);
        const rating=rec.r??null;
        const active=rating!=null||(rec.memo||"").trim();
        return(
          <div key={cat.key} style={card}><div style={{padding:"12px 16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
              <div style={{width:4,height:20,borderRadius:2,background:active?cat.color:"rgba(0,0,0,0.08)",flexShrink:0}}/>
              <span style={{fontSize:14,fontWeight:600,color:"rgba(0,0,0,0.65)",flex:1}}>{cat.label}</span>
            </div>
            <div style={{display:"flex",gap:4}}>
              {CARE_RATING_LABELS.map((lb,i)=>{const n=i+1;const on=rating===n;return(
                <button key={n} onClick={()=>patchCat(cat.key,{r:on?null:n})} aria-label={lb}
                  style={{flex:1,padding:"7px 0",border:"none",borderRadius:20,cursor:"pointer",fontFamily:"inherit",
                    display:"flex",alignItems:"center",justifyContent:"center",
                    background:on?cat.color:"rgba(0,0,0,0.06)",color:on?"rgba(0,0,0,0.6)":"rgba(0,0,0,0.3)"}}>
                  <CareMark n={n} on={on}/>
                </button>
              );})}
            </div>
            <CareMemo key={cat.key+curDate} memo={rec.memo} onChange={m=>patchCat(cat.key,{memo:m})}/>
          </div></div>
        );
      })}
    </div>
  );
}
function CareMemo({memo,onChange}) {
  const ref=useAutoGrow([memo]);
  return(
    <textarea ref={ref} defaultValue={memo||""} rows={1} placeholder="メモ（任意）"
      onInput={e=>fitTextarea(e.target)} onBlur={e=>onChange(e.target.value)}
      style={{width:"100%",border:"none",background:"transparent",fontSize:12,color:"rgba(0,0,0,0.55)",outline:"none",resize:"none",lineHeight:1.6,fontFamily:"inherit",padding:"8px 0 0 16px",overflow:"hidden"}}/>
  );
}

// ── 身体タブ（体重・BMI・月経）───────────────────
// 記録: bodyR = {date:{weight:kg, period:true}} / 設定: bodyC = {height:cm}
function BodyTab({records,conf,onUpdate,dateNav}) {
  const realToday=todayKey();
  const{curDate,prevDay,nextDay,goTo,goToday}=dateNav;
  const rec=records[curDate]||{};
  const height=conf?.height||null;
  const[editW,setEditW]=useState(false);
  const[wVal,setWVal]=useState("");
  useEffect(()=>{setEditW(false);},[curDate]);
  const patch=p=>{
    const nx=JSON.parse(JSON.stringify(records));
    const next={...(nx[curDate]||{}),...p};
    Object.keys(next).forEach(k=>{if(next[k]==null||next[k]===false||next[k]==="")delete next[k];});
    if(Object.keys(next).length)nx[curDate]=next;else delete nx[curDate];
    onUpdate(nx);
  };
  const bmi=rec.weight&&height?rec.weight/Math.pow(height/100,2):null;
  return(
    <div style={{width:"100%",maxWidth:380}}>
      <DateNav curDate={curDate} realToday={realToday} onPrev={prevDay} onNext={nextDay} onGoTo={goTo} onToday={goToday}/>
      {/* 体重・BMI */}
      <div style={card}><div style={{padding:"12px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:4,height:20,borderRadius:2,background:rec.weight?CAT.weight.color:"rgba(0,0,0,0.08)",flexShrink:0}}/>
          <span style={{fontSize:14,fontWeight:600,color:"rgba(0,0,0,0.65)"}}>体重</span>
          {editW?(
            <span style={{display:"inline-flex",alignItems:"center",gap:4}}>
              <input autoFocus type="number" inputMode="decimal" step="0.1" min="0" value={wVal}
                placeholder="--.-"
                onChange={e=>setWVal(e.target.value)}
                onBlur={()=>{const v=parseFloat(wVal);patch({weight:isNaN(v)||v<=0?null:Math.round(v*10)/10});setEditW(false);}}
                onKeyDown={e=>{if(e.key==="Enter")e.target.blur();}}
                style={{width:`${Math.max(4,String(wVal).length+1)}ch`,border:"none",borderBottom:"1px solid rgba(0,0,0,0.15)",background:"transparent",borderRadius:0,padding:"4px 0 1px",fontSize:12,fontWeight:400,color:"rgba(0,0,0,0.45)",outline:"none",fontFamily:"inherit",textAlign:"center"}}/>
              <span style={{fontSize:12,fontWeight:400,color:"rgba(0,0,0,0.4)"}}>kg{(()=>{
                const v=parseFloat(wVal);
                return height&&!isNaN(v)&&v>0?`・BMI ${(v/Math.pow(height/100,2)).toFixed(1)}`:"";
              })()}</span>
            </span>
          ):(
            rec.weight!=null&&<span style={{fontSize:12,fontWeight:400,color:"rgba(0,0,0,0.4)"}}>{rec.weight}kg{bmi?`・BMI ${bmi.toFixed(1)}`:""}</span>
          )}
          <div style={{flex:1}}/>
          <button
            onPointerDown={e=>{
              e.preventDefault();
              if(editW){
                const v=parseFloat(wVal);
                patch({weight:isNaN(v)||v<=0?null:Math.round(v*10)/10});
                setEditW(false);
              }else{
                setWVal(rec.weight!=null?String(rec.weight):"");
                setEditW(true);
              }
            }}
            style={{background:editW?"rgba(0,0,0,0.06)":hexA(CAT.weight.color,0.8),border:"none",borderRadius:20,padding:"6px 18px",fontSize:12,fontWeight:600,
              color:editW?"rgba(0,0,0,0.3)":"rgba(0,0,0,0.5)",cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>記入</button>
        </div>
      </div></div>
      {/* 月経 */}
      <div style={card}><div style={{padding:"12px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:4,height:20,borderRadius:2,background:rec.period?CAT.period.color:"rgba(0,0,0,0.08)",flexShrink:0}}/>
          <span style={{fontSize:14,fontWeight:600,color:"rgba(0,0,0,0.65)"}}>月経</span>
          {rec.period&&<span style={{fontSize:12,fontWeight:400,color:"rgba(0,0,0,0.4)"}}>あり</span>}
          <div style={{flex:1}}/>
          <button onClick={()=>patch({period:rec.period?null:true})}
            style={{background:rec.period?hexA(CAT.period.color,0.8):"rgba(0,0,0,0.06)",border:"none",borderRadius:20,padding:"6px 18px",fontSize:12,fontWeight:600,
              color:rec.period?"rgba(0,0,0,0.6)":"rgba(0,0,0,0.3)",cursor:"pointer",fontFamily:"inherit"}}>
            あり
          </button>
        </div>
      </div></div>
    </div>
  );
}

// ── 服薬タブ ──────────────────────────────────────────────
function MedTab({records,config,onTake,onUpdate,onRemove,onPrnAdd,onPrnTime,onPrnRemove,dateNav}) {
  const realToday=todayKey();
  const{curDate,prevDay,nextDay,goTo,goToday}=dateNav;
  const dr=records[curDate]||{},wd=dateWd(curDate);
  const aSlots=SLOT_DEFS.filter(s=>config.slots[s.id]?.enabled);
  const todayW=config.weeklyMeds.filter(wm=>wm.weekdays.includes(wd));
  const isToday=curDate===realToday;
  return(
    <div style={{width:"100%",maxWidth:380}}>
      <DateNav curDate={curDate} realToday={realToday} onPrev={prevDay} onNext={nextDay} onGoTo={goTo} onToday={goToday}/>
      {aSlots.map(s=>{
        const ts=dr[s.id];
        const curMeds=(config.slots[s.id]?.meds||[]).map(m=>m.name||m);
        // 表示する薬名：打刻済みなら焼き込み名を優先、なければ現在の設定
        const baked=(dr.__names&&dr.__names[s.id])||null;
        const meds=ts&&baked?baked:curMeds;
        // 非表示条件：今その時間帯に薬が無く、かつその日に打刻もない
        if(curMeds.length===0&&!ts)return null;
        return(
          <div key={s.id} style={card}>
            <div style={{display:"flex",alignItems:"flex-start",padding:"12px 16px",gap:12}}>
              <div style={{width:4,borderRadius:2,background:ts?s.color:"rgba(0,0,0,0.08)",flexShrink:0,alignSelf:"stretch"}}/>
              <div style={{flex:1,minWidth:0}}>
                <p style={{fontSize:14,fontWeight:600,color:"rgba(0,0,0,0.65)"}}>{s.label}</p>
                {meds.length>0&&<p style={{fontSize:11,color:"rgba(0,0,0,0.35)",marginTop:2,lineHeight:1.5}}>{meds.join("　")}</p>}
              </div>
              {ts
                ?<TimeCell iso={ts} color={s.color} dim={s.dim} onUpdate={hm=>onUpdate(curDate,s.id,hm)} onRemove={()=>onRemove(curDate,s.id)}/>
                :<button onClick={()=>onTake(curDate,s.id)} style={{background:s.color,border:"none",borderRadius:20,padding:"6px 16px",fontSize:12,fontWeight:600,color:"rgba(0,0,0,0.5)",cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap",flexShrink:0}}>飲んだ</button>}
            </div>
          </div>
        );
      })}
      {todayW.length>0&&<>
        <p style={{...secLbl,marginTop:4}}>曜日限定</p>
        {todayW.map(wm=>{
          const key=`w:${wm.id}`,ts=dr[key];
          return(
            <div key={wm.id} style={card}>
              <div style={{display:"flex",alignItems:"center",padding:"12px 16px",gap:12}}>
                <div style={{width:4,borderRadius:2,background:ts?WC:"rgba(0,0,0,0.08)",flexShrink:0,alignSelf:"stretch"}}/>
                <div style={{flex:1}}>
                  <p style={{fontSize:14,fontWeight:600,color:"rgba(0,0,0,0.65)"}}>{wm.name}</p>
                  <p style={{fontSize:11,color:"rgba(0,0,0,0.35)",marginTop:2}}>{wm.weekdays.map(d=>WDL[d]).join("・")}曜日</p>
                </div>
                {ts
                  ?<TimeCell iso={ts} color={WC} dim={WDM} onUpdate={hm=>onUpdate(curDate,key,hm)} onRemove={()=>onRemove(curDate,key)}/>
                  :<button onClick={()=>onTake(curDate,key)} style={{background:WC,border:"none",borderRadius:20,padding:"6px 16px",fontSize:12,fontWeight:600,color:"rgba(0,0,0,0.5)",cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>飲んだ</button>}
              </div>
            </div>
          );
        })}
      </>}
      <PrnField records={records} config={config} onPrnAdd={onPrnAdd} onPrnTime={onPrnTime} onPrnRemove={onPrnRemove} onNote={(dk,v)=>onUpdate(dk,"prn",v)} dateKey={curDate}/>
      <div style={{...card,marginTop:2}}>
        <div style={{padding:"10px 16px",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,color:"rgba(0,0,0,0.33)",flex:1}}>{isToday?"本日":"当日"}</span>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"flex-end"}}>
            {aSlots.filter(s=>((config.slots[s.id]?.meds||[]).length>0)||dr[s.id]).map(s=><div key={s.id} style={{borderRadius:8,padding:"4px 7px",background:dr[s.id]?s.color:"rgba(0,0,0,0.06)",fontSize:10,fontWeight:600,color:dr[s.id]?"rgba(0,0,0,0.5)":"rgba(0,0,0,0.2)"}}>{s.label}</div>)}
            {todayW.length>0&&(()=>{const anyTaken=todayW.some(wm=>dr[`w:${wm.id}`]);return(
              <div style={{borderRadius:8,padding:"4px 7px",background:anyTaken?WC:"rgba(0,0,0,0.06)",fontSize:10,fontWeight:600,color:anyTaken?"rgba(0,0,0,0.5)":"rgba(0,0,0,0.2)"}}>曜日限定</div>
            );})()}
            {(dr.prn||(Array.isArray(dr.prnList)&&dr.prnList.length))&&<div style={{borderRadius:8,padding:"4px 7px",background:"#f5e6b0",fontSize:10,fontWeight:600,color:"rgba(0,0,0,0.5)"}}>頓服</div>}
          </div>
        </div>
      </div>
    </div>
  );
}
function PrnField({records,config,onPrnAdd,onPrnTime,onPrnRemove,onNote,dateKey}) {
  const dk=dateKey||todayKey();
  const noteRef=useRef(null);
  const dr=records[dk]||{};
  const list=Array.isArray(dr.prnList)?dr.prnList:[];
  const presets=config?.prnMeds||[];
  useEffect(()=>{if(noteRef.current){noteRef.current.value=dr.prn||"";fitTextarea(noteRef.current);}},[dk]);
  const sorted=[...list].sort((a,b)=>a.time.localeCompare(b.time));
  return(
    <div style={{...card,marginTop:6}}>
      <div style={{padding:"12px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <div style={{width:4,height:18,borderRadius:2,background:(list.length||(dr.prn&&dr.prn.trim()))?"#f5e6b0":"rgba(0,0,0,0.08)",flexShrink:0}}/>
          <p style={{fontSize:11,fontWeight:700,color:"rgba(0,0,0,0.5)",letterSpacing:".05em"}}>頓服</p>
        </div>
        {/* プリセット選択 */}
        {presets.length>0&&(
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:list.length?10:8}}>
            {presets.map(p=>(
              <button key={p.id} onClick={()=>onPrnAdd(dk,p)}
                style={{padding:"5px 12px",fontSize:11,fontWeight:600,border:"none",borderRadius:16,cursor:"pointer",fontFamily:"inherit",
                  background:p.color||"#d0d0d0",color:"rgba(0,0,0,0.6)"}}>
                {p.name}
              </button>
            ))}
          </div>
        )}
        {/* 記録済みリスト */}
        {sorted.map(e=>(
          <div key={e.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",paddingLeft:4}}>
            <div style={{width:3,height:16,borderRadius:2,background:e.color||"#d0d0d0",flexShrink:0}}/>
            <span style={{flex:1,fontSize:12,color:"rgba(0,0,0,0.6)"}}>{e.name}</span>
            <TimeCell iso={e.time} color={e.color||"#d0d0d0"} dim={hexA(e.color||"#d0d0d0",0.4)}
              onUpdate={hm=>onPrnTime(dk,e.id,hm)} onRemove={()=>onPrnRemove(dk,e.id)}/>
          </div>
        ))}
        {/* 自由記述 */}
        <div style={{marginTop:list.length?8:0,paddingTop:list.length?8:0,borderTop:list.length?"1px solid rgba(0,0,0,0.05)":"none"}}>
          <textarea ref={noteRef} defaultValue={dr.prn||""} rows={1}
            onInput={e=>fitTextarea(e.target)} onBlur={e=>onNote(dk,e.target.value)} placeholder="メモ（自由記入）"
            style={{width:"100%",border:"none",background:"transparent",fontSize:12,color:"rgba(0,0,0,0.62)",outline:"none",resize:"none",lineHeight:1.6,fontFamily:"inherit",padding:0,overflow:"hidden"}}/>
        </div>
      </div>
    </div>
  );
}

// ── 食事タブ ──────────────────────────────────────────────
function MealTab({records,onUpdate,dateNav}) {
  const realToday=todayKey();
  const{curDate,prevDay,nextDay,goTo,goToday}=dateNav;
  const[adding,setAdding]=useState(false);
  const[editId,setEditId]=useState(null);
  const entries=records[curDate]||[];
  const add=e=>{onUpdate({...records,[curDate]:[...entries,e]});setAdding(false);};
  const saveEdit=v=>{onUpdate({...records,[curDate]:entries.map(e=>e.id===editId?{...e,...v}:e)});setEditId(null);};
  const updT=(id,hm)=>onUpdate({...records,[curDate]:entries.map(e=>e.id===id?{...e,time:hmIso(curDate,hm)}:e)});
  const rem=id=>{const a=entries.filter(e=>e.id!==id),nx={...records};if(a.length)nx[curDate]=a;else delete nx[curDate];onUpdate(nx);setEditId(null);};
  const sorted=[...entries].sort((a,b)=>a.time.localeCompare(b.time));
  const totalCal=entries.reduce((s,e)=>s+(e.calories||0),0);
  return(
    <div style={{width:"100%",maxWidth:380}}>
      <DateNav curDate={curDate} realToday={realToday} onPrev={prevDay} onNext={nextDay} onGoTo={goTo} onToday={goToday}/>
      {totalCal>0&&<div style={{...card,marginBottom:10}}><div style={{padding:"8px 16px",display:"flex",alignItems:"center"}}><span style={{fontSize:11,color:"rgba(0,0,0,0.33)",flex:1}}>本日合計</span><span style={{fontSize:14,fontWeight:700,color:"rgba(0,0,0,0.6)"}}>{totalCal.toLocaleString()} kcal</span></div></div>}
      {sorted.map(e=>{
        const c=MEAL_COLORS[e.category]||MEAL_COLORS["その他"];
        if(editId===e.id) return(
          <MealForm key={e.id} initial={e} submitLabel="保存"
            onSave={saveEdit} onCancel={()=>setEditId(null)} onDelete={()=>rem(e.id)}/>
        );
        return(
          <div key={e.id} style={card}>
            <div style={{padding:"12px 16px"}}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:6}}>
                <div style={{width:4,height:20,borderRadius:2,background:c.color,flexShrink:0}}/>
                <span style={{fontSize:14,fontWeight:600,color:"rgba(0,0,0,0.65)",flex:1}}>{e.category}</span>
                <TimeCell iso={e.time} color={c.color} dim={c.dim} showRemove={false} onUpdate={hm=>updT(e.id,hm)} onRemove={()=>rem(e.id)}/>
                <button onClick={()=>setEditId(e.id)} style={{...smBtn(),fontSize:11,padding:"3px 8px",flexShrink:0}}>編集</button>
              </div>
              <div style={{display:"flex",gap:6,paddingLeft:16,flexWrap:"wrap",alignItems:"center"}}>
                {e.calories!=null&&<span style={{fontSize:11,fontWeight:600,color:"rgba(0,0,0,0.5)",background:c.dim,borderRadius:8,padding:"3px 8px"}}>{e.calories} kcal</span>}
                {e.memo&&<span style={{fontSize:11,color:"rgba(0,0,0,0.4)",lineHeight:1.5}}>{e.memo}</span>}
              </div>
            </div>
          </div>
        );
      })}
      {adding?<MealForm submitLabel="記録" onSave={add} onCancel={()=>setAdding(false)}/>:<button onClick={()=>setAdding(true)} style={addBtn}>＋ 食事を記録</button>}
    </div>
  );
}
function MealForm({initial,onSave,onCancel,onDelete,submitLabel="記録"}) {
  const[cat,setCat]=useState(initial?.category||"朝食");
  const calRef=useRef(null),memoRef=useRef(null);
  useEffect(()=>{fitTextarea(memoRef.current);},[]);
  const mc=MEAL_COLORS[cat]||MEAL_COLORS["その他"];
  const save=()=>{
    const cal=calRef.current?.value?parseInt(calRef.current.value):null;
    onSave({category:cat,calories:cal||null,memo:memoRef.current?.value||"",
      ...(initial?{}:{id:uid(),time:new Date().toISOString()})});
  };
  return(
    <div style={card}><div style={{padding:"14px 16px"}}>
      <div style={{display:"flex",gap:4,marginBottom:12,flexWrap:"wrap"}}>
        {MEAL_CATS.map(c=>{const cc=MEAL_COLORS[c]||MEAL_COLORS["その他"];return(<button key={c} onClick={()=>setCat(c)} style={{padding:"5px 10px",fontSize:11,fontWeight:600,border:"none",borderRadius:8,cursor:"pointer",fontFamily:"inherit",background:cat===c?cc.color:"rgba(0,0,0,0.06)",color:cat===c?"rgba(0,0,0,0.6)":"rgba(0,0,0,0.35)"}}>{c}</button>);})}
      </div>
      <div style={{marginBottom:12}}>
        <p style={{fontSize:10,color:"rgba(0,0,0,0.38)",fontWeight:600,marginBottom:4}}>カロリー（任意）</p>
        <div style={{display:"flex",alignItems:"center",gap:4}}><input ref={calRef} type="number" min="0" max="9999" placeholder="0" defaultValue={initial?.calories??""} style={{...inp,width:72,flex:"none"}}/><span style={{fontSize:11,color:"rgba(0,0,0,0.35)"}}>kcal</span></div>
      </div>
      <textarea ref={memoRef} rows={1} placeholder="メモ（任意）" defaultValue={initial?.memo||""} onInput={e=>fitTextarea(e.target)} style={{...inp,resize:"none",lineHeight:1.6,marginBottom:12,overflow:"hidden"}}/>
      <div style={{display:"flex",gap:8}}>
        {onDelete&&<button onClick={onDelete} style={{...smBtn("rgba(0,0,0,0.05)"),fontSize:12,color:"rgba(0,0,0,0.35)",padding:"8px 10px"}}>削除</button>}
        <button onClick={onCancel} style={{...smBtn(),flex:1,padding:"8px 0",fontSize:12}}>キャンセル</button>
        <button onClick={save} style={{...smBtn(mc.color),flex:2,padding:"8px 0",fontSize:12,fontWeight:700}}>{submitLabel}</button>
      </div>
    </div></div>
  );
}

// ── 行動メモタブ ──────────────────────────────────────────

  const rem=id=>{const a=entries.filter(e=>e.id!==id),nx={...records};if(a.length)nx[curDate]=a;else delete nx[curDate];onUpdate(nx);};
  const updT=(id,hm)=>onUpdate({...records,[curDate]:entries.map(e=>e.id===id?{...e,time:hmIso(curDate,hm)}:e)});
  const updTxt=(id,txt)=>onUpdate({...records,[curDate]:entries.map(e=>e.id===id?{...e,text:txt}:e)});
  const sorted=[...entries].sort((a,b)=>b.time.localeCompare(a.time));
  return(
    <div>
      <div style={card}><div style={{padding:"12px 16px"}}>
        <textarea ref={inputRef} value={text} onChange={e=>{setText(e.target.value);fitTextarea(e.target);}}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();add();}}}
          rows={1} placeholder="行動メモを入力…"
          style={{width:"100%",border:"none",background:"transparent",fontSize:13,color:"rgba(0,0,0,0.7)",outline:"none",resize:"none",lineHeight:1.6,fontFamily:"inherit",overflow:"hidden"}}/>
        <div style={{display:"flex",justifyContent:"flex-end",marginTop:6}}>
          <button onClick={add} style={{...smBtn(text.trim()?"rgba(0,0,0,0.09)":"rgba(0,0,0,0.04)"),padding:"6px 14px",fontSize:12,fontWeight:600,color:text.trim()?"rgba(0,0,0,0.55)":"rgba(0,0,0,0.25)"}}>記録</button>
        </div>
      </div></div>
      {sorted.map(e=>(
        <MemoCard key={e.id+curDate} entry={e} curDate={curDate}
          onTime={hm=>updT(e.id,hm)} onSaveText={t=>updTxt(e.id,t)} onDelete={()=>rem(e.id)}/>
      ))}
    </div>
  );
}
function MemoCard({entry,curDate,onTime,onSaveText,onDelete}) {
  const[editing,setEditing]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{if(editing&&ref.current){ref.current.focus();fitTextarea(ref.current);}},[editing]);
  const save=()=>{const v=ref.current?.value??entry.text;onSaveText(v);setEditing(false);};
  return(
    <div style={card}><div style={{padding:"12px 16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <div style={{width:4,height:20,borderRadius:2,background:CAT.memo.color,flexShrink:0}}/>
        <div style={{flex:1}}><TimeCell iso={entry.time} color={CAT.memo.color} dim={CAT.memo.dim} showRemove={false} onUpdate={onTime} onRemove={()=>{}}/></div>
        {!editing&&<button onClick={()=>setEditing(true)} style={{...smBtn(),fontSize:11,padding:"3px 8px"}}>編集</button>}
      </div>
      {editing?(
        <div>
          <textarea ref={ref} defaultValue={entry.text||""} rows={1} onInput={e=>fitTextarea(e.target)}
            style={{width:"100%",border:"none",borderBottom:"1px solid rgba(0,0,0,0.1)",background:"transparent",fontSize:13,color:"rgba(0,0,0,0.7)",outline:"none",resize:"none",lineHeight:1.6,fontFamily:"inherit",paddingBottom:8,marginBottom:12,overflow:"hidden"}}/>
          <div style={{display:"flex",gap:8}}>
            <button onMouseDown={e=>e.preventDefault()} onClick={onDelete} style={{...smBtn("rgba(0,0,0,0.05)"),fontSize:11,color:"rgba(0,0,0,0.35)",padding:"9px 10px"}}>削除</button>
            <button onMouseDown={e=>{e.preventDefault();setEditing(false);}} style={{...smBtn(),flex:1,padding:"9px 0",fontSize:11}}>キャンセル</button>
            <button onMouseDown={e=>{e.preventDefault();save();}} style={{...smBtn(CAT.memo.color),flex:2,padding:"9px 0",fontSize:11,fontWeight:700}}>保存</button>
          </div>
        </div>
      ):(
        <p style={{fontSize:13,color:"rgba(0,0,0,0.65)",lineHeight:1.6,whiteSpace:"pre-wrap",paddingLeft:12}}>{entry.text}</p>
      )}
    </div></div>
  );
}


// ── 気分日記タブ ──────────────────────────────────────────
// レコード形式: records[ds] = { mood:0-4|null, tags:[tagId...], diary:"", condition:1-5|null, sleep:1-5|null }
function RatingCard({field,value,onChange}) {

          {value!=null&&(
            <span style={{fontSize:11,fontWeight:600,color:"rgba(0,0,0,0.55)",background:field.color,borderRadius:14,padding:"3px 12px"}}>
              {RATING_LABELS[value-1]}
            </span>
          )}
          <button onClick={()=>setOpen(o=>!o)} style={{...smBtn(),fontSize:11,padding:"3px 8px"}}>編集</button>
        </div>
        {open&&(
          <div style={{display:"flex",gap:4,marginTop:12}}>
            {RATING_LABELS.map((lb,i)=>{const n=i+1;const on=value===n;return(

                  background:on?field.color:"rgba(0,0,0,0.06)",color:on?"rgba(0,0,0,0.6)":"rgba(0,0,0,0.3)"}}>
                {lb}

            );})}
          </div>
        )}

}
function MoodTab({records,tagConf,onUpdate,memoR,onMemoUpdate,dateNav}) {
  const realToday=todayKey();
  const{curDate,prevDay,nextDay,goTo,goToday}=dateNav;
  const rec=records[curDate]||{};
  const tags=tagConf?.tags||[];
  const patch=p=>{
    const next={...rec,...p};
    const nx={...records};
    const empty=next.mood==null&&!(next.tags||[]).length&&!(next.diary||"").trim()&&next.condition==null&&next.sleep==null;
    if(empty)delete nx[curDate];else nx[curDate]=next;
    onUpdate(nx);
  };
  // タグは {id,name} で焼き込み保存（旧形式=ID文字列とも互換）
  const tagId=t=>typeof t==="string"?t:t.id;
  const isTagOn=id=>(rec.tags||[]).some(t=>tagId(t)===id);
  const toggleTag=tag=>{
    const cur=rec.tags||[];
    const on=cur.some(t=>tagId(t)===tag.id);
    patch({tags:on?cur.filter(t=>tagId(t)!==tag.id):[...cur,{id:tag.id,name:tag.name}]});
  };
  return(
    <div style={{width:"100%",maxWidth:380}}>
      <DateNav curDate={curDate} realToday={realToday} onPrev={prevDay} onNext={nextDay} onGoTo={goTo} onToday={goToday}/>

      {/* 今日の気分 */}
      <div style={card}><div style={{padding:"14px 16px"}}>
        <p style={{...secLbl,margin:"0 0 10px"}}>今日の気分</p>
        <div style={{display:"flex",gap:4}}>
          {MOOD_LABELS.map((lb,i)=>(
            <button key={i} onClick={()=>patch({mood:rec.mood===i?null:i})}
              style={{flex:1,padding:"8px 0",fontSize:11,fontWeight:600,border:"none",borderRadius:20,cursor:"pointer",fontFamily:"inherit",
                background:rec.mood===i?hexA(CAT.mood.color,0.8):"rgba(0,0,0,0.06)",color:rec.mood===i?"rgba(0,0,0,0.6)":"rgba(0,0,0,0.3)"}}>
              {lb}
            </button>
          ))}
        </div>
      </div></div>

      {/* 体調・睡眠（気分と同形式・直接選択） */}
      {RATING_FIELDS.map(f=>(
        <div key={f.key} style={card}><div style={{padding:"14px 16px"}}>
          <p style={{...secLbl,margin:"0 0 10px"}}>{f.label}</p>
          <div style={{display:"flex",gap:4}}>
            {RATING_LABELS.map((lb,i)=>{const n=i+1;const on=rec[f.key]===n;return(
              <button key={n} onClick={()=>patch({[f.key]:on?null:n})}
                style={{flex:1,padding:"8px 0",fontSize:11,fontWeight:600,border:"none",borderRadius:20,cursor:"pointer",fontFamily:"inherit",
                  background:on?hexA(f.color,0.8):"rgba(0,0,0,0.06)",color:on?"rgba(0,0,0,0.6)":"rgba(0,0,0,0.3)"}}>
                {lb}
              </button>
            );})}
          </div>
        </div></div>
      ))}

      {/* 出来事タグ */}
      <div style={card}><div style={{padding:"14px 16px"}}>
        <p style={{...secLbl,margin:"0 0 10px"}}>出来事タグ</p>
        {tags.length===0
          ?<p style={{fontSize:11,color:"rgba(0,0,0,0.3)"}}>設定からタグを追加できます</p>
          :<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {tags.map(t=>{const on=isTagOn(t.id);return(
              <button key={t.id} onClick={()=>toggleTag(t)}
                style={{padding:"5px 12px",fontSize:11,fontWeight:600,border:"none",borderRadius:16,cursor:"pointer",fontFamily:"inherit",
                  background:on?hexA(t.color||"#b8d8f0",0.8):"rgba(0,0,0,0.06)",color:on?"rgba(0,0,0,0.6)":"rgba(0,0,0,0.35)"}}>
                {t.name}
              </button>
            );})}
          </div>}
      </div></div>

      {/* 日記 */}
      <div style={card}><div style={{padding:"14px 16px"}}>
        <p style={{...secLbl,margin:"0 0 8px"}}>日記</p>
        <DiaryField key={curDate} value={rec.diary||""} onChange={v=>patch({diary:v})}/>
      </div></div>

    </div>
  );
}
function DiaryField({value,onChange}) {
  const ref=useAutoGrow([value]);
  return(
    <textarea ref={ref} defaultValue={value} rows={2} placeholder="今日の日記を自由に記入…"
      onInput={e=>fitTextarea(e.target)} onBlur={e=>onChange(e.target.value)}
      style={{width:"100%",border:"none",background:"transparent",fontSize:13,color:"rgba(0,0,0,0.7)",outline:"none",resize:"none",lineHeight:1.7,fontFamily:"inherit",minHeight:60,overflow:"hidden"}}/>
  );
}

// ── 履歴（旧タイムライン）+ 検索 ─────────────────────────
function TimelineTab({bathR,medR,medConf,mealR,teethR,skinR,careR,bodyR,bodyC,memoR,moodR,tagConf,teethConf}) {
  const[search,setSearch]=useState("");
  const q=search.trim().toLowerCase();
  const allKeys=[...new Set([...Object.keys(bathR),...Object.keys(medR),...Object.keys(mealR),...Object.keys(teethR),...Object.keys(memoR),...Object.keys(moodR)])].sort((a,b)=>b.localeCompare(a));
  const today=todayKey();
  const sortT=(a,b)=>!a.t&&!b.t?0:!a.t?1:!b.t?-1:a.t.localeCompare(b.t);
  // 日付文字列が検索語にマッチするか（複数表記に対応）
  const dateMatches=ds=>{
    if(!q)return false;
    const[y,m,d]=ds.split("-");
    const mm=String(+m),dd=String(+d);
    const wd=WDL[dateWd(ds)];
    const forms=[
      ds,                              // 2026-06-28
      `${y}/${m}/${d}`,`${y}/${mm}/${dd}`,
      `${m}/${d}`,`${mm}/${dd}`,        // 06/28, 6/28
      `${m}-${d}`,`${mm}-${dd}`,
      `${mm}月${dd}日`,`${dd}日`,`${mm}月`,
      `${y}年${mm}月${dd}日`,`${y}年`,`${y}年${mm}月`,
      wd,`${wd}曜`,`${wd}曜日`,
    ];
    return forms.some(f=>f.toLowerCase().includes(q));
  };
  const matchItem=it=>(it.label||"").toLowerCase().includes(q)||(it.sub||"").toLowerCase().includes(q);
  // 日付がヒットした日はその日の全項目を表示
  let dayHit=false;
  const matchQ=it=>!q||dayHit||matchItem(it);
  return(
    <div style={{width:"100%",maxWidth:380}}>
      <div style={{...card,marginBottom:10}}>
        <div style={{padding:"10px 16px",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,fontWeight:600,color:"rgba(0,0,0,0.35)"}}>検索</span>
          <input type="text" value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="キーワードで絞り込み"
            style={{flex:1,border:"none",background:"transparent",fontSize:12,color:"rgba(0,0,0,0.65)",outline:"none"}}/>
          {search&&<button onClick={()=>setSearch("")} style={icoBtn}>✕</button>}
        </div>
      </div>
      {allKeys.length===0&&<p style={{fontSize:12,color:"rgba(0,0,0,0.3)",textAlign:"center",marginTop:32}}>まだ記録がありません</p>}
      {allKeys.map(ds=>{
        dayHit=dateMatches(ds);
        const bath=bathR[ds]||[],med=medR[ds]||{},meal=mealR[ds]||[],teeth=teethR[ds],memo=memoR[ds]||[],mood=moodR[ds]||null;
        const wd=dateWd(ds);
        const aS=SLOT_DEFS.filter(s=>medConf.slots[s.id]?.enabled);
        const dW=medConf.weeklyMeds.filter(wm=>wm.weekdays.includes(wd));
        const memoItems=memo.map(e=>({t:e.time,label:"メモ",color:CAT.memo.color,sub:e.text})).filter(matchQ).sort(sortT);
        const careRating=careR?.[ds]||{};
        const rl=k=>{const o=normCare(careRating[k]);const parts=[o.r?CARE_RATING_LABELS[o.r-1]:null,(o.memo||"").trim()||null].filter(Boolean);return parts.length?parts.join(" "):null;};
        const bathItems=[
          ...bath.map(e=>({t:e.time,label:"入浴",color:CAT.bath.color,sub:e.memo})),
          ...(rl("bath")?[{t:null,label:"入浴",color:CAT.bath.color,sub:rl("bath")}]:[]),
        ].filter(matchQ).sort(sortT);
        const teethItems=[
          ...(Array.isArray(teeth)?teeth:[]).map(e=>{const it=(teethConf?.items||[]).find(x=>x.id===e.itemId);return{t:e.time,label:e.itemName||"歯磨き",color:(it&&it.color)||CAT.teeth.color,sub:""};}),
          ...(rl("teeth")?[{t:null,label:"歯磨き",color:CAT.teeth.color,sub:rl("teeth")}]:[]),
        ].filter(matchQ).sort(sortT);
        const skin=(skinR?.[ds])||[];
        const skinItems=[
          ...(Array.isArray(skin)?skin:[]).map(e=>({t:e.time,label:"スキンケア",color:CAT.skin.color,sub:""})),
          ...(rl("skin")?[{t:null,label:"スキンケア",color:CAT.skin.color,sub:rl("skin")}]:[]),
        ].filter(matchQ).sort(sortT);
        const mealItems=meal.map(e=>{const c=MEAL_COLORS[e.category]||MEAL_COLORS["その他"];return{t:e.time,label:e.category,color:c.color,sub:[e.calories?`${e.calories}kcal`:null,e.memo].filter(Boolean).join(" ")};}).filter(matchQ).sort(sortT);
        const medItems=[];
        aS.forEach(s=>{if(med[s.id])medItems.push({t:med[s.id],label:`服薬 ${s.label}`,color:s.color,sub:(med.__names&&med.__names[s.id]?med.__names[s.id]:(medConf.slots[s.id]?.meds||[]).map(m=>m.name||m)).join("/")});});
        dW.forEach(wm=>{const k=`w:${wm.id}`;if(med[k])medItems.push({t:med[k],label:(med.__names&&med.__names[k]?med.__names[k][0]:wm.name),color:WC,sub:""});});
        (Array.isArray(med.prnList)?med.prnList:[]).forEach(e=>medItems.push({t:e.time,label:`頓服 ${e.name}`,color:"#f5e6b0",sub:""}));
        if(med.prn)medItems.push({t:null,label:"頓服メモ",color:"#f5e6b0",sub:med.prn});
        const filteredMed=medItems.filter(matchQ).sort(sortT);
        const moodItems=[];
        if(mood){
          const allTags=tagConf?.tags||[];
          if(mood.mood!=null)moodItems.push({t:null,label:"気分",color:CAT.mood.color,sub:MOOD_LABELS[mood.mood]});
          const tagNames=(mood.tags||[]).map(t=>typeof t==="string"?((allTags.find(x=>x.id===t)||{}).name):t.name).filter(Boolean);
          if(tagNames.length)moodItems.push({t:null,label:"タグ",color:"#dddddd",sub:tagNames.join("・")});
          if((mood.diary||"").trim())moodItems.push({t:null,label:"日記",color:CAT.mood.color,sub:mood.diary});
          if(mood.condition!=null)moodItems.push({t:null,label:"体調",color:"#cfe0f2",sub:RATING_LABELS[mood.condition-1]});
          if(mood.sleep!=null)moodItems.push({t:null,label:"睡眠",color:"#ddd2f0",sub:RATING_LABELS[mood.sleep-1]});
        }
        const filteredMood=moodItems.filter(matchQ);
        const body=bodyR?.[ds]||{};
        const bodyItems=[];
        if(body.weight!=null){
          const h=bodyC?.height;
          const bmi=h?`・BMI ${(body.weight/Math.pow(h/100,2)).toFixed(1)}`:"";
          bodyItems.push({t:null,label:"体重",color:CAT.weight.color,sub:`${body.weight}kg${bmi}`});
        }
        if(body.period)bodyItems.push({t:null,label:"月経",color:CAT.period.color,sub:"あり"});
        const filteredBody=bodyItems.filter(matchQ);
        const groups=[{key:"mood",items:filteredMood},{key:"memo",items:memoItems},{key:"body",items:filteredBody},{key:"bath",items:bathItems},{key:"teeth",items:teethItems},{key:"skin",items:skinItems},{key:"meal",items:mealItems},{key:"med",items:filteredMed}].filter(g=>g.items.length>0);
        if(!groups.length)return null;
        return(
          <div key={ds} style={card}><div style={{padding:"12px 16px"}}>
            <p style={{fontSize:12,fontWeight:700,color:"rgba(0,0,0,0.55)",marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
              {fmtDate(ds)}
              {ds===today&&<span style={{fontSize:10,fontWeight:600,background:"rgba(0,0,0,0.06)",color:"rgba(0,0,0,0.35)",borderRadius:6,padding:"1px 6px"}}>今日</span>}
            </p>
            {groups.map((g,gi)=>(
              <div key={g.key}>
                {gi>0&&<div style={{borderTop:"1px solid rgba(0,0,0,0.06)",margin:"6px 0"}}/>}
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {g.items.map((it,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8}}>
                      <div style={{width:3,height:18,borderRadius:2,background:it.color,flexShrink:0,alignSelf:"flex-start"}}/>
                      <div style={{flex:1,minWidth:0,display:"flex",alignItems:"flex-start",gap:5}}>
                        <span style={{fontSize:12,lineHeight:"18px",color:"rgba(0,0,0,0.55)",flexShrink:0}}>{it.label}</span>
                        {it.sub&&<span style={{flex:1,minWidth:0,fontSize:10,lineHeight:"18px",color:"rgba(0,0,0,0.3)",wordBreak:"break-word"}}>{it.sub}</span>}
                      </div>
                      {it.t&&<span style={{fontSize:11,lineHeight:"18px",fontWeight:600,color:"rgba(0,0,0,0.4)",flexShrink:0}}>{isoHM(it.t)}</span>}
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div></div>
        );
      })}
      {q&&allKeys.every(ds=>{/* check if search has any results */return false;})&&<p style={{fontSize:12,color:"rgba(0,0,0,0.3)",textAlign:"center",marginTop:20}}>該当する記録がありません</p>}
    </div>
  );
}

// ── 統計：カレンダー ──────────────────────────────────────
function MonthCalendar({month,bathR,teethR,skinR,careR}) {
  const[y,m]=month.split("-");
  const fd=new Date(+y,+m-1,1).getDay();
  const dim=dimY(y,m);
  const today=todayKey();
  const cells=[];
  for(let i=0;i<fd;i++)cells.push(null);
  for(let d=1;d<=dim;d++)cells.push(d);
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:4}}>
        {["日","月","火","水","木","金","土"].map((d,i)=>(
          <div key={i} style={{textAlign:"center",fontSize:9,color:i===0?"rgba(200,50,50,0.55)":i===6?"rgba(50,100,200,0.45)":"rgba(0,0,0,0.3)",paddingBottom:2}}>{d}</div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px 0"}}>
        {cells.map((day,i)=>{
          if(!day)return<div key={i} style={{height:28}}/>;
          const ds=padDate(y,+m,day);
          const cd_=careR?.[ds]||{};
          const done=k=>{const o=normCare(cd_[k]);return o.r!=null&&o.r>=2;};
          const bath=bathR[ds]?.length>0||done("bath");
          const teeth=(Array.isArray(teethR[ds])&&teethR[ds].length>0)||done("teeth");
          const skin=(Array.isArray(skinR?.[ds])&&skinR[ds].length>0)||done("skin");
          const isToday=ds===today,isFuture=ds>today;
          const dow=(fd+day-1)%7;
          return(
            <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",height:28,paddingTop:1}}>
              <div style={{width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"50%",flexShrink:0,background:"transparent"}}>
                <span style={{fontSize:10,lineHeight:1,fontWeight:isToday?700:400,color:isFuture?"rgba(0,0,0,0.15)":dow===0?"rgba(200,50,50,0.55)":dow===6?"rgba(50,100,200,0.45)":"rgba(0,0,0,0.55)"}}>{day}</span>
              </div>
              {!isFuture&&(bath||teeth||skin)&&(
                <div style={{display:"flex",gap:2,marginTop:1}}>
                  {bath&&<div style={{width:4,height:4,borderRadius:"50%",background:CAT.bath.color}}/>}
                  {teeth&&<div style={{width:4,height:4,borderRadius:"50%",background:CAT.teeth.color}}/>}
                  {skin&&<div style={{width:4,height:4,borderRadius:"50%",background:CAT.skin.color}}/>}
                </div>
              )}
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:12,marginTop:8}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:7,height:7,borderRadius:"50%",background:CAT.bath.color}}/><span style={{fontSize:10,color:"rgba(0,0,0,0.4)"}}>入浴</span></div>
        <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:7,height:7,borderRadius:"50%",background:CAT.teeth.color}}/><span style={{fontSize:10,color:"rgba(0,0,0,0.4)"}}>歯磨き</span></div>
        <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:7,height:7,borderRadius:"50%",background:CAT.skin.color}}/><span style={{fontSize:10,color:"rgba(0,0,0,0.4)"}}>スキンケア</span></div>
      </div>
    </div>
  );
}

// ── 統計：服薬チャート ─────────────────────────────────────
function MedTimingChart({records,config,month}) {
  const[y,m]=month.split("-");const dim=dimY(y,m);const today=todayKey();
  const H=160,Y0=0,Y1=24,YR=Y1-Y0;
  // 系列を構築：各スロット + 曜日薬
  const aSlots=SLOT_DEFS.filter(s=>config.slots[s.id]?.enabled);
  // 曜日限定の薬はグラフに表示しない（定時スロットのみ）
  const series=aSlots.map(s=>({key:s.id,label:s.label,color:s.color,weekly:false}));
  // 各系列につき、日ごとの服用時刻（h）を集める
  const toH=iso=>{const t=new Date(iso);const h=t.getHours()+t.getMinutes()/60;return (h>=Y0&&h<=Y1)?h:null;};
  const seriesData=series.map(s=>{
    const pts=[];
    for(let day=1;day<=dim;day++){
      const ds=padDate(y,+m,day);
      // 曜日薬は「服用対象の曜日」だけを対象日とする（非対象日は配列に入れず線を連続させる）
      if(s.weekly&&!s.weekdays.includes(dateWd(ds)))continue;
      if(ds>today){pts.push({day,h:null,future:true});continue;}
      const dr=records[ds]||{};const iso=dr[s.key];
      pts.push({day,h:iso?toH(iso):null});
    }
    return {...s,pts};
  });
  const has=seriesData.some(s=>s.pts.some(p=>p.h!=null));
  const ticks=[0,4,8,12,16,20,24];
  if(!has)return<p style={{fontSize:12,color:"rgba(0,0,0,0.3)",textAlign:"center",padding:"12px 0"}}>今月の記録がありません</p>;
  const xOf=day=>dim>1?((day-1)/(dim-1))*100:50;
  const yOf=h=>((h-Y0)/YR)*100;
  return(
    <div>
      <div style={{display:"flex"}}>
        <div style={{width:28,position:"relative",height:H,flexShrink:0}}>
          {ticks.map(h=><div key={h} style={{position:"absolute",right:4,top:`${yOf(h)}%`,fontSize:8,color:"rgba(0,0,0,0.3)",transform:"translateY(-50%)",textAlign:"right",whiteSpace:"nowrap"}}>{`${h%24}時`}</div>)}
        </div>
        <div style={{flex:1,position:"relative",height:H,background:"rgba(0,0,0,0.02)",borderRadius:8,overflow:"hidden"}}>
          {ticks.map(h=><div key={h} style={{position:"absolute",left:0,right:0,top:`${yOf(h)}%`,height:1,background:"rgba(0,0,0,0.07)"}}/>)}
          <svg viewBox="0 0 100 100" style={{position:"absolute",inset:0,width:"100%",height:"100%",overflow:"visible"}} preserveAspectRatio="none">
            {seriesData.map(s=>{
              // 連続して記録のある区間ごとにパスを分割（途切れたら新しいパス）
              const paths=[];let run=[];
              const flush=()=>{if(run.length){paths.push(run);run=[];}};
              s.pts.forEach(p=>{ if(p.h==null||p.future){flush();return;} run.push({x:xOf(p.day),y:yOf(p.h)}); });
              flush();
              return paths.map((pp,idx)=>(
                <path key={s.key+"-"+idx} d={smoothPath(pp)} fill="none" stroke={s.color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke"/>
              ));
            })}
          </svg>
          <span style={{position:"absolute",bottom:2,left:2,fontSize:8,color:"rgba(0,0,0,0.25)"}}>1日</span>
          <span style={{position:"absolute",bottom:2,left:"50%",fontSize:8,color:"rgba(0,0,0,0.25)",transform:"translateX(-50%)"}}>{Math.round(dim/2)}日</span>
          <span style={{position:"absolute",bottom:2,right:2,fontSize:8,color:"rgba(0,0,0,0.25)"}}>{dim}日</span>
        </div>
      </div>
      <div style={{display:"flex",gap:10,marginTop:6,flexWrap:"wrap"}}>
        {series.map(s=><div key={s.key} style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:14,height:3,borderRadius:2,background:s.color}}/><span style={{fontSize:9,color:"rgba(0,0,0,0.4)"}}>{s.label}</span></div>)}
      </div>
    </div>
  );
}

// ── 統計：食事カロリー ─────────────────────────────────────
function DailyCalChart({records,month}) {
  const[y,m]=month.split("-");const dim=dimY(y,m);const today=todayKey();
  const daily=[];
  for(let d=1;d<=dim;d++){const ds=padDate(y,+m,d);const total=(records[ds]||[]).reduce((s,e)=>s+(e.calories||0),0);daily.push({d,total,future:ds>today});}
  const monthTotal=daily.reduce((s,d)=>s+(d.future?0:d.total),0);
  const maxCal=Math.max(...daily.map(d=>d.total),1);
  if(monthTotal===0)return<p style={{fontSize:12,color:"rgba(0,0,0,0.3)",textAlign:"center",padding:"12px 0"}}>今月のカロリー記録がありません</p>;
  return(
    <div>
      <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:10}}>
        <span style={{fontSize:22,fontWeight:700,color:"rgba(0,0,0,0.65)"}}>{monthTotal.toLocaleString()}</span>
        <span style={{fontSize:11,color:"rgba(0,0,0,0.35)"}}>kcal（月合計）</span>
      </div>
      <div style={{display:"flex",alignItems:"flex-end",gap:"2px",height:44}}>
        {daily.map(({d,total,future})=><div key={d} style={{flex:1,display:"flex",alignItems:"flex-end",justifyContent:"center"}}><div style={{width:"40%",height:future?0:total>0?Math.max(2,Math.round(total/maxCal*40)):1,background:future?"transparent":total>0?CAT.meal.color:"rgba(0,0,0,0.06)",borderRadius:"99px 99px 0 0"}}/></div>)}
      </div>
      <div style={{borderTop:"1px solid rgba(0,0,0,0.06)",paddingTop:2,display:"flex",justifyContent:"space-between"}}>
        <span style={{fontSize:8,color:"rgba(0,0,0,0.25)"}}>1日</span><span style={{fontSize:8,color:"rgba(0,0,0,0.25)"}}>{fmtMonth(month)}</span><span style={{fontSize:8,color:"rgba(0,0,0,0.25)"}}>{dim}日</span>
      </div>
    </div>
  );
}

      <MonthNav month={month} maxMonth={curMonth} onPrev={prev} onNext={next} onPick={setMonth}/>

      <p style={{...secLbl,marginTop:8}}>ケア</p>
      <div style={card}><div style={{padding:"12px 16px"}}><MonthCalendar month={month} bathR={bathR} teethR={teethR} skinR={skinR} careR={careR}/></div></div>
      <p style={{...secLbl,marginTop:8}}>服薬の時間帯</p>

      <p style={{...secLbl,marginTop:8}}>気分・体調・睡眠</p>

      <p style={{...secLbl,marginTop:8}}>体重</p>

      <p style={{...secLbl,marginTop:8}}>月経周期</p>
      <div style={card}><div style={{padding:"12px 16px"}}><PeriodSummary bodyR={bodyR}/></div></div>
    </div>
  );
}

// ── 体重推移グラフ ───────────────────
function WeightChart({records,month}) {
  const today=todayKey();
  const[mode,setMode]=useState("month"); // "month" | "year"
  const[y,m]=month.split("-");const dim=dimY(y,m);
  // データ点の収集
  const pts=[];
  if(mode==="month"){
    for(let d=1;d<=dim;d++){const ds=padDate(y,+m,d);if(ds>today)continue;
      const w=records?.[ds]?.weight;if(w!=null)pts.push({x:d,w});}
  }else{
    // 年表示：1年分（1/1〜12/31）を日単位で
    const start=`${y}-01-01`;
    Object.keys(records||{}).sort().forEach(ds=>{
      if(!ds.startsWith(`${y}-`)||ds>today)return;
      const w=records[ds]?.weight;if(w==null)return;
      pts.push({x:diffD(start,ds)+1,w});
    });
  }
  const X=mode==="month"?dim:(dimY(y,12)===31?diffD(`${y}-01-01`,`${y}-12-31`)+1:365);
  const toggle=(
    <div style={{display:"flex",gap:6,marginBottom:10,justifyContent:"center"}}>
      {[["month","月"],["year","年"]].map(([k,lb])=>(
        <button key={k} onClick={()=>setMode(k)}
          style={{border:"none",cursor:"pointer",fontFamily:"inherit",borderRadius:14,padding:"5px 14px",fontSize:10,fontWeight:600,
            background:mode===k?"rgba(0,0,0,0.08)":"rgba(0,0,0,0.03)",color:mode===k?"rgba(0,0,0,0.65)":"rgba(0,0,0,0.4)"}}>
          {lb}
        </button>
      ))}
    </div>
  );
  if(!pts.length)return<div>{toggle}<p style={{fontSize:12,color:"rgba(0,0,0,0.3)",textAlign:"center",padding:"12px 0"}}>記録がありません</p></div>;
  const ws=pts.map(p=>p.w);
  const lo=Math.floor(Math.min(...ws)-0.5),hi=Math.ceil(Math.max(...ws)+0.5);
  const H=130;
  const yOf=w=>H-8-((w-lo)/(hi-lo))*(H-16);
  const xOf=x=>X>1?((x-1)/(X-1))*100:50;
  const lineD=pts.map((p,i)=>`${i?"L":"M"} ${xOf(p.x)} ${yOf(p.w)}`).join(" ");
  const ticks=[hi,(hi+lo)/2,lo];
  const xLabels=mode==="month"
    ?[["1日",0],[`${Math.round(dim/2)}日`,50],[`${dim}日`,100]]
    :[["1月",0],["6月",Math.round(xOf(diffD(`${y}-01-01`,`${y}-06-15`)+1))],["12月",100]];
  return(
    <div>
      {toggle}
      <div style={{display:"flex"}}>
        <div style={{width:38,position:"relative",height:H,flexShrink:0}}>
          {ticks.map((v,i)=>(
            <div key={i} style={{position:"absolute",right:4,top:yOf(v),fontSize:8,color:"rgba(0,0,0,0.3)",transform:"translateY(-50%)",whiteSpace:"nowrap"}}>{Math.round(v*10)/10}</div>
          ))}
        </div>
        <div style={{flex:1,position:"relative",height:H,background:"rgba(0,0,0,0.02)",borderRadius:8}}>
          {ticks.map((v,i)=><div key={i} style={{position:"absolute",left:0,right:0,top:yOf(v),height:1,background:"rgba(0,0,0,0.05)"}}/>)}
          <svg viewBox={`0 0 100 ${H}`} style={{position:"absolute",inset:0,width:"100%",height:"100%",overflow:"visible"}} preserveAspectRatio="none">
            <path d={lineD} fill="none" stroke={CAT.weight.color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke"/>
          </svg>
          {pts.map(p=>(
            <div key={p.x} style={{position:"absolute",left:`${xOf(p.x)}%`,top:yOf(p.w),width:mode==="month"?4:3,height:mode==="month"?4:3,borderRadius:"50%",background:CAT.weight.color,transform:"translate(-50%,-50%)"}}/>
          ))}
          {xLabels.map(([lb,pos],i)=>(
            <span key={i} style={{position:"absolute",bottom:-14,left:`${pos}%`,fontSize:8,color:"rgba(0,0,0,0.25)",transform:pos===0?"none":pos===100?"translateX(-100%)":"translateX(-50%)"}}>{lb}</span>
          ))}
        </div>
      </div>
      <div style={{height:8}}/>
    </div>
  );
}

// ── 月経周期サマリー ───────────────────
function PeriodSummary({bodyR}) {
  const st=periodStats(bodyR);
  const today=todayKey();
  const fmt=ds=>{const[,mm,dd]=ds.split("-");return`${+mm}月${+dd}日`;};
  const PRow=({label,right})=>(
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0"}}>
      <div style={{width:3,height:14,borderRadius:2,background:CAT.period.color,flexShrink:0}}/>
      <span style={{flex:1,fontSize:12,color:"rgba(0,0,0,0.6)"}}>{label}</span>
      <span style={{fontSize:12,fontWeight:600,color:"rgba(0,0,0,0.55)"}}>{right}</span>
    </div>
  );
  if(!st)return<p style={{fontSize:12,color:"rgba(0,0,0,0.3)",textAlign:"center",padding:"12px 0"}}>記録がありません</p>;
  return(
    <div>
      {st.lastStart&&<PRow label="前回開始" right={fmt(st.lastStart)}/>}
      {st.avgLen!=null&&<PRow label="平均期間" right={`${st.avgLen}日`}/>}
      {st.avgCycle!=null
        ?<PRow label={`平均周期（${st.cycleCount}周期分）`} right={`${st.avgCycle}日`}
        />
        :<p style={{fontSize:11,color:"rgba(0,0,0,0.35)",padding:"4px 0 0 11px"}}>周期は開始が2回以上記録されると計算されます</p>}
      {st.next&&(()=>{
        const du=diffD(today,st.next);
        const rel=du>0?`あと${du}日`:du===0?"今日":`${-du}日経過`;
        return<PRow label="次回予測" right={`${fmt(st.next)}（${rel}）`}/>;
      })()}
    </div>
  );
}



// ── 統計：受診用サマリー ──────────────────────────────────
function ClinicSummary({month,medR,medConf,moodR,bathR,teethR,skinR,careR,mealR}) {
  const[y,m]=month.split("-");const dim=dimY(y,m);const today=todayKey();
  // 対象日数（未来は除く）
  let daysInScope=0;
  for(let d=1;d<=dim;d++){if(padDate(y,+m,d)<=today)daysInScope++;}
  if(daysInScope===0)return<p style={{fontSize:12,color:"rgba(0,0,0,0.3)",textAlign:"center",padding:"12px 0"}}>この月のデータはありません</p>;

  // ── 服薬集計 ──
  const aSlots=SLOT_DEFS.filter(s=>medConf.slots[s.id]?.enabled);
  const slotStats=aSlots.map(s=>{
    let taken=0;
    for(let d=1;d<=dim;d++){const ds=padDate(y,+m,d);if(ds>today)continue;if((medR[ds]||{})[s.id])taken++;}
    return{label:s.label,color:s.color,taken,total:daysInScope,pct:Math.round(taken/daysInScope*100)};
  });
  const weeklyStats=medConf.weeklyMeds.map(wm=>{
    let due=0,taken=0;
    for(let d=1;d<=dim;d++){const ds=padDate(y,+m,d);if(ds>today)continue;if(!wm.weekdays.includes(dateWd(ds)))continue;due++;if((medR[ds]||{})[`w:${wm.id}`])taken++;}
    return{label:wm.name,color:WC,taken,total:due,pct:due?Math.round(taken/due*100):null};
  }).filter(w=>w.total>0);
  // 頓服回数（prnList件数 + prnメモのある日数）
  let prnCount=0,prnNoteDays=0;
  for(let d=1;d<=dim;d++){const ds=padDate(y,+m,d);if(ds>today)continue;const dr=medR[ds]||{};
    if(Array.isArray(dr.prnList))prnCount+=dr.prnList.length;
    if(dr.prn&&dr.prn.trim())prnNoteDays++;}

  // ── 気分・体調・睡眠 集計 ──
  const collect=getV=>{
    const vals=[];
    for(let d=1;d<=dim;d++){const ds=padDate(y,+m,d);if(ds>today)continue;const r=moodR[ds];const v=r?getV(r):null;if(v!=null)vals.push(v);}
    return vals;
  };
  const fields=[
    {label:"気分",vals:collect(r=>r.mood!=null?r.mood+1:null)},
    {label:"体調",vals:collect(r=>r.condition??null)},
    {label:"睡眠",vals:collect(r=>r.sleep??null)},
  ];
  const fmtField=f=>{
    if(!f.vals.length)return null;
    const avg=f.vals.reduce((s,v)=>s+v,0)/f.vals.length;
    const low=f.vals.filter(v=>v<=2).length; // 悪い・最悪の日数
    return{...f,avg,avgLabel:RATING_LABELS[Math.min(4,Math.max(0,Math.round(avg)-1))],low,n:f.vals.length};
  };
  const fieldStats=fields.map(fmtField).filter(Boolean);

  const Row=({label,right,color})=>(
    <div style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0"}}>
      {color&&<div style={{width:3,height:14,borderRadius:2,background:color,flexShrink:0}}/>}
      <span style={{flex:1,fontSize:12,color:"rgba(0,0,0,0.6)"}}>{label}</span>
      <span style={{fontSize:12,fontWeight:600,color:"rgba(0,0,0,0.55)"}}>{right}</span>
    </div>
  );

  return(
    <div>
      <p style={{fontSize:11,fontWeight:700,color:"rgba(0,0,0,0.45)",marginBottom:6}}>服薬</p>
      {slotStats.map(s=><Row key={s.label} label={s.label} color={s.color} right={`${s.taken}/${s.total}日（${s.pct}%）`}/>)}
      {weeklyStats.map(w=><Row key={w.label} label={w.label} color={w.color} right={`${w.taken}/${w.total}回（${w.pct}%）`}/>)}
      {(prnCount>0||prnNoteDays>0)&&(
        <Row label="頓服" color="#f5e6b0" right={prnCount>0?`${prnCount}回${prnNoteDays>0?`（メモ${prnNoteDays}日）`:""}`:`メモ${prnNoteDays}日`}/>
      )}
      {fieldStats.length>0&&<>
        <p style={{fontSize:11,fontWeight:700,color:"rgba(0,0,0,0.45)",margin:"12px 0 6px"}}>気分・体調・睡眠</p>
        {fieldStats.map(f=>(
          <Row key={f.label} label={`${f.label}（記録${f.n}日）`}
            right={`平均 ${f.avgLabel}・悪い日 ${f.low}日`}/>
        ))}
      </>}
      {(()=>{
        // ── 生活：入浴・歯磨き・スキンケアの平均評価（気分・体調・睡眠と同形式）、平均カロリー ──
        const careCats=[
          {key:"bath", label:"入浴",       color:CAT.bath.color},
          {key:"teeth",label:"歯磨き",     color:CAT.teeth.color},
          {key:"skin", label:"スキンケア", color:CAT.skin.color},
        ];
        const careStats=careCats.map(cc=>{
          const vals=[];
          for(let d=1;d<=dim;d++){const ds=padDate(y,+m,d);if(ds>today)continue;
            const o=normCare(careR?.[ds]?.[cc.key]);if(o.r!=null)vals.push(o.r);}
          if(!vals.length)return null;
          const avg=vals.reduce((s,v)=>s+v,0)/vals.length;
          const avgN=Math.min(4,Math.max(1,Math.round(avg)));
          const low=vals.filter(v=>v===1).length;
          return{...cc,n:vals.length,avgN,low};
        }).filter(Boolean);
        let calSum=0,calDays=0;
        for(let d=1;d<=dim;d++){const ds=padDate(y,+m,d);if(ds>today)continue;
          const meals=Array.isArray(mealR?.[ds])?mealR[ds]:[];
          const dayCal=meals.reduce((s,e)=>s+(e.calories||0),0);
          if(dayCal>0){calSum+=dayCal;calDays++;}
        }
        if(careStats.length===0&&calDays===0)return null;
        return(<>
          <p style={{fontSize:11,fontWeight:700,color:"rgba(0,0,0,0.45)",margin:"12px 0 6px"}}>生活</p>
          {careStats.map(cs=>(
            <Row key={cs.key} label={`${cs.label}（記録${cs.n}日）`} color={cs.color}
              right={<>平均 <CareMark n={cs.avgN} size={12} op={0.55} inline/>・できなかった日 {cs.low}日</>}/>
          ))}
          {calDays>0&&<Row label={`カロリー（記録${calDays}日）`} color={MEAL_COLORS["朝食"].color} right={`平均 ${Math.round(calSum/calDays).toLocaleString()} kcal/日`}/>}
        </>);
      })()}
      {fieldStats.length===0&&slotStats.every(s=>s.taken===0)&&prnCount===0&&(
        <p style={{fontSize:12,color:"rgba(0,0,0,0.3)",textAlign:"center",padding:"8px 0"}}>この月の記録がありません</p>
      )}
    </div>
  );
}

// ── 統計：気分チャート（月／年トグル）─────────────────────
function MoodCombinedChart({records,month}) {
  const today=todayKey();
  const SERIES=[
    { key:"mood",      label:"気分", color:CAT.mood.color, get:r=>r.mood!=null?r.mood+1:null },
    { key:"condition", label:"体調", color:"#a8c8e8",       get:r=>r.condition??null },
    { key:"sleep",     label:"睡眠", color:"#c8b8e8",       get:r=>r.sleep??null },
  ];
  // 表示切替：押したボタンの系列が表示される（複数同時OK）
  const[vis,setVis]=useState({mood:true,condition:true,sleep:true});
  const toggleVis=k=>setVis(v=>({...v,[k]:!v[k]}));
  const levels=5;
  const[y,m]=month.split("-");const dim=dimY(y,m);const N=dim;
  const xLabels=["1日",`${Math.round(dim/2)}日`,`${dim}日`];
  const buildSeries=getV=>{
    const pts=[];
    for(let d=1;d<=dim;d++){const ds=padDate(y,+m,d);const r=records[ds];pts.push({i:d-1,v:r?getV(r):null,future:ds>today});}
    return pts;
  };
  const seriesData=SERIES.map(s=>({...s,pts:buildSeries(s.get)}));
  const has=seriesData.some(s=>s.pts.some(p=>p.v!=null&&!p.future));
  const H=130;
  const yOf=v=>H-8-((v-1)/(levels-1))*(H-16);
  const xOf=i=>N>1?(i/(N-1))*100:50;
  // 折れ線パス（記録が途切れたら分割）
  const polySegs=s=>{
    const paths=[];let run=[];
    const flush=()=>{if(run.length>1)paths.push(run);run=[];};
    s.pts.forEach(p=>{ if(p.v==null||p.future){flush();return;} run.push({x:xOf(p.i),y:yOf(p.v)}); });
    flush();return paths;
  };
  const lineD=pp=>pp.map((p,idx)=>`${idx?"L":"M"} ${p.x} ${p.y}`).join(" ");
  const visible=seriesData.filter(s=>vis[s.key]);

  return(
    <div>
      {/* 表示切替：押したボタンの系列を表示（複数同時OK） */}
      <div style={{display:"flex",gap:6,marginBottom:10,justifyContent:"center",flexWrap:"wrap"}}>
        {SERIES.map(s=>{const on=vis[s.key];return(
          <button key={s.key} onClick={()=>toggleVis(s.key)}
            style={{display:"flex",alignItems:"center",gap:5,border:"none",cursor:"pointer",fontFamily:"inherit",
              background:on?"rgba(0,0,0,0.08)":"rgba(0,0,0,0.03)",borderRadius:14,padding:"5px 11px",opacity:on?1:0.55}}>
            <div style={{width:14,height:3,borderRadius:2,background:s.color}}/>
            <span style={{fontSize:10,fontWeight:600,color:on?"rgba(0,0,0,0.65)":"rgba(0,0,0,0.4)"}}>{s.label}</span>
          </button>
        );})}
      </div>
      {!has
        ?<p style={{fontSize:12,color:"rgba(0,0,0,0.3)",textAlign:"center",padding:"12px 0"}}>記録がありません</p>
        :<div style={{display:"flex"}}>
          <div style={{width:38,position:"relative",height:H,flexShrink:0}}>
            {[5,4,3,2,1].map(v=>(
              <div key={v} style={{position:"absolute",right:4,top:yOf(v),fontSize:8,color:"rgba(0,0,0,0.3)",transform:"translateY(-50%)",whiteSpace:"nowrap"}}>{RATING_LABELS[v-1]}</div>
            ))}
          </div>
          <div style={{flex:1,position:"relative",height:H,background:"rgba(0,0,0,0.02)",borderRadius:8}}>
            {[1,2,3,4,5].map(v=><div key={v} style={{position:"absolute",left:0,right:0,top:yOf(v),height:1,background:"rgba(0,0,0,0.05)"}}/>)}
            <svg viewBox={`0 0 100 ${H}`} style={{position:"absolute",inset:0,width:"100%",height:"100%",overflow:"visible"}} preserveAspectRatio="none">
              {visible.map(s=>polySegs(s).map((pp,idx)=>(
                <path key={s.key+"-"+idx} d={lineD(pp)} fill="none" stroke={s.color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke"/>
              )))}
            </svg>
            {/* 日付ごとの点（SVG外のdivで真円を保つ） */}
            {visible.map(s=>s.pts.filter(p=>p.v!=null&&!p.future).map(p=>(
              <div key={s.key+"-pt-"+p.i} style={{position:"absolute",left:`${xOf(p.i)}%`,top:yOf(p.v),width:4,height:4,borderRadius:"50%",background:s.color,transform:"translate(-50%,-50%)"}}/>
            )))}
            <span style={{position:"absolute",bottom:-14,left:0,fontSize:8,color:"rgba(0,0,0,0.25)"}}>{xLabels[0]}</span>
            <span style={{position:"absolute",bottom:-14,left:"50%",fontSize:8,color:"rgba(0,0,0,0.25)",transform:"translateX(-50%)"}}>{xLabels[1]}</span>
            <span style={{position:"absolute",bottom:-14,right:0,fontSize:8,color:"rgba(0,0,0,0.25)"}}>{xLabels[2]}</span>
          </div>
        </div>}
      <div style={{height:8}}/>
    </div>
  );
}

// ── 服薬設定（削除バグ修正・編集ボタン常時表示）───────────
function MedSettingsSection({config,onConfigChange}) {
  const[newMeds,setNewMeds]=useState(Object.fromEntries(SLOT_DEFS.map(s=>[s.id,""])));
  const[editingMed,setEditingMed]=useState(null);
  const[editingW,setEditingW]=useState(null);
  const[newWN,setNewWN]=useState("");const[newWD,setNewWD]=useState([]);
  const editRef=useRef(null);
  useEffect(()=>{if(editingMed&&editRef.current)editRef.current.focus();},[editingMed]);
  const upd=(id,p)=>onConfigChange({...config,slots:{...config.slots,[id]:{...config.slots[id],...p}}});
  const tog=id=>upd(id,{enabled:!config.slots[id].enabled});
  const addM=sId=>{const n=newMeds[sId].trim();if(!n)return;upd(sId,{meds:[...(config.slots[sId]?.meds||[]),{id:uid(),name:n}]});setNewMeds(p=>({...p,[sId]:""}));};
  // 編集保存：空名の場合もeditingMedを閉じる
  const moveM=(sId,mId,dir)=>{const a=[...config.slots[sId].meds];const i=a.findIndex(m=>m.id===mId);const j=i+dir;if(i<0||j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];upd(sId,{meds:a});};
  const saveE=(sId,mId,n)=>{n=n.trim();if(n)upd(sId,{meds:config.slots[sId].meds.map(m=>m.id===mId?{...m,name:n}:m)});setEditingMed(null);};
  const delM=(sId,mId)=>upd(sId,{meds:config.slots[sId].meds.filter(m=>m.id!==mId)});
  const addW=()=>{const n=newWN.trim();if(!n||!newWD.length)return;onConfigChange({...config,weeklyMeds:[...config.weeklyMeds,{id:uid(),name:n,weekdays:[...newWD]}]});setNewWN("");setNewWD([]);};
  const remW=id=>onConfigChange({...config,weeklyMeds:config.weeklyMeds.filter(wm=>wm.id!==id)});
  const saveW=()=>{if(!editingW||!editingW.name.trim()||!editingW.weekdays.length)return;onConfigChange({...config,weeklyMeds:config.weeklyMeds.map(wm=>wm.id===editingW.id?{...wm,name:editingW.name.trim(),weekdays:editingW.weekdays}:wm)});setEditingW(null);};
  return(<>
    {SLOT_DEFS.map(s=>{
      const sc=config.slots[s.id]||{enabled:true,meds:[]};const meds=(sc.meds||[]).map(normMed);
      return(
        <div key={s.id} style={card}>
          <div style={{display:"flex",alignItems:"center",padding:"12px 16px",gap:10,borderBottom:sc.enabled?"1px solid rgba(0,0,0,0.05)":"none"}}>
            <div style={{width:4,height:20,borderRadius:2,background:sc.enabled?s.color:"rgba(0,0,0,0.08)",flexShrink:0}}/>
            <span style={{flex:1,fontSize:13,fontWeight:600,color:sc.enabled?"rgba(0,0,0,0.65)":"rgba(0,0,0,0.3)"}}>{s.label}</span>
            <button onClick={()=>tog(s.id)} style={{...smBtn(sc.enabled?s.dim:"rgba(0,0,0,0.06)"),color:sc.enabled?"rgba(0,0,0,0.5)":"rgba(0,0,0,0.3)"}}>{sc.enabled?"無効にする":"有効にする"}</button>
          </div>
          {sc.enabled&&<div style={{padding:"8px 16px 12px"}}>
            {meds.map(med=>{
              const isE=editingMed?.slotId===s.id&&editingMed?.medId===med.id;
              return(
                <div key={med.id} style={{borderBottom:"1px solid rgba(0,0,0,0.04)"}}>
                  {isE?(
                    <div style={{padding:"5px 0 10px"}}>
                      <input ref={editRef} defaultValue={med.name}
                        onKeyDown={e=>{if(e.key==="Enter")saveE(s.id,med.id,editRef.current?.value||"");}}
                        style={{...inp,marginBottom:10}}/>
                      <div style={{display:"flex",gap:8}}>
                        <button onMouseDown={e=>e.preventDefault()} onClick={()=>{delM(s.id,med.id);setEditingMed(null);}}
                          style={{...smBtn("rgba(0,0,0,0.05)"),fontSize:11,color:"rgba(0,0,0,0.35)",padding:"9px 10px"}}>削除</button>
                        <button onMouseDown={e=>{e.preventDefault();setEditingMed(null);}}

                      </div>

                    <div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 0"}}>
                      <span style={{flex:1,fontSize:12,color:"rgba(0,0,0,0.6)"}}>{med.name}</span>
                      {(()=>{const i=meds.findIndex(m=>m.id===med.id);return(<>

        <div key={wm.id} style={card}>

            <div style={{padding:"12px 16px"}}>
              <input value={editingW.name} onChange={e=>setEditingW(p=>({...p,name:e.target.value}))} style={{...inp,marginBottom:10}}/>
              <div style={{display:"flex",gap:4,marginBottom:10}}>
                {WDL.map((lb,i)=><button key={i} onClick={()=>setEditingW(p=>({...p,weekdays:p.weekdays.includes(i)?p.weekdays.filter(x=>x!==i):[...p.weekdays,i]}))} style={{flex:1,padding:"6px 0",fontSize:12,fontWeight:600,border:"none",borderRadius:8,cursor:"pointer",fontFamily:"inherit",background:editingW.weekdays.includes(i)?WC:"rgba(0,0,0,0.06)",color:editingW.weekdays.includes(i)?"rgba(0,0,0,0.5)":"rgba(0,0,0,0.25)"}}>{lb}</button>)}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{remW(wm.id);setEditingW(null);}} style={{...smBtn("rgba(0,0,0,0.05)"),fontSize:11,color:"rgba(0,0,0,0.35)",padding:"7px 10px"}}>削除</button>
                <button onClick={()=>setEditingW(null)} style={{...smBtn(),flex:1,padding:"7px 0",fontSize:11}}>キャンセル</button>
                <button onClick={saveW} style={{...smBtn(editingW.name.trim()&&editingW.weekdays.length?WC:"rgba(0,0,0,0.05)"),flex:2,padding:"7px 0",fontSize:11,fontWeight:700}}>保存</button>
              </div>
            </div>

              <div style={{width:4,height:20,borderRadius:2,background:WC,flexShrink:0}}/>

    <div style={card}><div style={{padding:"12px 16px"}}>
      <input type="text" placeholder="曜日限定の薬の名前" value={newWN} onChange={e=>setNewWN(e.target.value)} style={{...inp,marginBottom:10}}/>
      <div style={{display:"flex",gap:4,marginBottom:10}}>
        {WDL.map((lb,i)=><button key={i} onClick={()=>setNewWD(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i])} style={{flex:1,padding:"6px 0",fontSize:12,fontWeight:600,border:"none",borderRadius:8,cursor:"pointer",fontFamily:"inherit",background:newWD.includes(i)?WC:"rgba(0,0,0,0.06)",color:newWD.includes(i)?"rgba(0,0,0,0.5)":"rgba(0,0,0,0.25)"}}>{lb}</button>)}

    </div></div>
  </>);
}
